services:
  db:
    image: ${POSTGRES_IMAGE:-docker.io/library/postgres:15-alpine@sha256:09e4f20b14ddb3dfe3a0c825b206032aaf8f28300ba2070c0b60fc1c10c6abc7}
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ${POSTGRES_DB:-vulhunter}
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      start_period: 30s
      retries: 12
    networks:
      - vulhunter-network

  scan-workspace-init:
    image: ${SCAN_WORKSPACE_INIT_IMAGE:-docker.io/library/alpine:3.20@sha256:d9e853e87e55526f6b2917df91a2115c36dd7c696a35be12163d44e6e2a4b6bc}
    restart: "no"
    volumes:
      - scan_workspace:/tmp/vulhunter/scans
    command:
      - sh
      - -ec
      - |
        mkdir -p /tmp/vulhunter/scans
        chown -R 1001:1001 /tmp/vulhunter/scans
        chmod -R u+rwX,g+rwX /tmp/vulhunter/scans
        touch /tmp/vulhunter/scans/.scan-workspace-ready
        sleep 15
    healthcheck:
      test: [ "CMD-SHELL", "test -f /tmp/vulhunter/scans/.scan-workspace-ready" ]
      interval: 1s
      timeout: 2s
      retries: 30
    networks:
      - vulhunter-network

  db-bootstrap:
    image: ${BACKEND_IMAGE:-ghcr.io/codesearchvuln/vulhunter-backend@sha256:e4208c6f1b175eb300a1a826fcb92f22d3447337dc1415ac5b88e6d0f73fe646}
    restart: "no"
    working_dir: /app
    volumes:
      - ./docker/env/backend:/docker/env/backend
    env_file:
      - path: ./docker/env/backend/.env
        required: false
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/${POSTGRES_DB:-vulhunter}
    command:
      - /opt/backend-venv/bin/python
      - -m
      - app.runtime.db_contract
      - bootstrap
    depends_on:
      db:
        condition: service_healthy
    networks:
      - vulhunter-network

  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/codesearchvuln/vulhunter-backend@sha256:e4208c6f1b175eb300a1a826fcb92f22d3447337dc1415ac5b88e6d0f73fe646}
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./docker/env/backend:/docker/env/backend
      - backend_uploads:/app/uploads
      - backend_runtime_data:/app/data/runtime
      - scan_workspace:/tmp/vulhunter/scans
      - ${DOCKER_SOCKET_PATH:-/var/run/docker.sock}:/var/run/docker.sock
    group_add:
      - "${DOCKER_SOCKET_GID:-1001}"
    ports:
      - "${VULHUNTER_BACKEND_PORT:-8000}:8000"
    env_file:
      - path: ./docker/env/backend/.env
        required: false
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/${POSTGRES_DB:-vulhunter}
      ASYNCPG_DSN: postgresql://postgres:postgres@db:5432/${POSTGRES_DB:-vulhunter}
      REDIS_URL: redis://redis:6379/0
      RESET_STATIC_SCAN_TABLES_ON_DEPLOY: "false"
      AGENT_ENABLED: "true"
      SANDBOX_ENABLED: "true"
      YASA_ENABLED: ${YASA_ENABLED:-true}
      SCAN_WORKSPACE_ROOT: ${SCAN_WORKSPACE_ROOT:-/tmp/vulhunter/scans}
      SCAN_WORKSPACE_VOLUME: ${SCAN_WORKSPACE_VOLUME:-vulhunter_scan_workspace}
      RUNNER_PREFLIGHT_ENABLED: "${RUNNER_PREFLIGHT_ENABLED:-true}"
      RUNNER_PREFLIGHT_STRICT: "${RUNNER_PREFLIGHT_STRICT:-true}"
      RUNNER_PREFLIGHT_OFFLINE_MODE: "${RUNNER_PREFLIGHT_OFFLINE_MODE:-false}"
      RUNNER_PREFLIGHT_TIMEOUT_SECONDS: "${RUNNER_PREFLIGHT_TIMEOUT_SECONDS:-30}"
      RUNNER_PREFLIGHT_MAX_CONCURRENCY: "${RUNNER_PREFLIGHT_MAX_CONCURRENCY:-2}"
      DOCKERHUB_LIBRARY_MIRROR: ${DOCKERHUB_LIBRARY_MIRROR:-m.daocloud.io/docker.io/library}
      BACKEND_APT_MIRROR_PRIMARY: ${BACKEND_APT_MIRROR_PRIMARY:-mirrors.aliyun.com}
      BACKEND_APT_SECURITY_PRIMARY: ${BACKEND_APT_SECURITY_PRIMARY:-mirrors.aliyun.com}
      BACKEND_APT_MIRROR_FALLBACK: ${BACKEND_APT_MIRROR_FALLBACK:-deb.debian.org}
      BACKEND_APT_SECURITY_FALLBACK: ${BACKEND_APT_SECURITY_FALLBACK:-security.debian.org}
      BACKEND_PYPI_INDEX_PRIMARY: ${BACKEND_PYPI_INDEX_PRIMARY:-}
      BACKEND_PYPI_INDEX_FALLBACK: ${BACKEND_PYPI_INDEX_FALLBACK:-}
      BACKEND_PYPI_INDEX_CANDIDATES: ${BACKEND_PYPI_INDEX_CANDIDATES:-https://mirrors.aliyun.com/pypi/simple/,https://pypi.tuna.tsinghua.edu.cn/simple,https://pypi.mirrors.ustc.edu.cn/simple/,https://mirrors.cloud.tencent.com/pypi/simple/,https://mirrors.huaweicloud.com/repository/pypi/simple/,https://mirrors.bfsu.edu.cn/pypi/web/simple/,https://pypi.org/simple}
      SCANNER_YASA_IMAGE: ${SCANNER_YASA_IMAGE:-ghcr.io/codesearchvuln/vulhunter-yasa-runner@sha256:8a50911050d9173df66cfb4b0077958da5100dfdc0f631fec47f7a91690a6005}
      SCANNER_OPENGREP_IMAGE: ${SCANNER_OPENGREP_IMAGE:-ghcr.io/codesearchvuln/vulhunter-opengrep-runner@sha256:ac5a9b7a1a7ac6e0f394e4fb84a4aeac719cbb1e3b4fc03c8bd783c1db0b6b30}
      SCANNER_BANDIT_IMAGE: ${SCANNER_BANDIT_IMAGE:-ghcr.io/codesearchvuln/vulhunter-bandit-runner@sha256:d74db7882a4d5dc38460df07c00cdfb05185888d69583371dba29a5acf794bae}
      SCANNER_GITLEAKS_IMAGE: ${SCANNER_GITLEAKS_IMAGE:-ghcr.io/codesearchvuln/vulhunter-gitleaks-runner@sha256:252f0ab3f630069bb97516a77a13c9598950baf595dec50a7f2a32907686d21b}
      SCANNER_PHPSTAN_IMAGE: ${SCANNER_PHPSTAN_IMAGE:-ghcr.io/codesearchvuln/vulhunter-phpstan-runner@sha256:e2603baf15d0d9b45d7026a6575205bc98f85ec7a18bbf743303c0b8c4f752b9}
      SCANNER_PMD_IMAGE: ${SCANNER_PMD_IMAGE:-ghcr.io/codesearchvuln/vulhunter-pmd-runner@sha256:6c90e7436bf36dfa0519ee48887b1120a6da1b25f4c7e05edb67497d1d542ea4}
      FLOW_PARSER_RUNNER_IMAGE: ${FLOW_PARSER_RUNNER_IMAGE:-ghcr.io/codesearchvuln/vulhunter-flow-parser-runner@sha256:7ab1af432c4d0e23646af86f6496f52375104da688627e14260582f66ac57c21}
      SANDBOX_RUNNER_IMAGE: ${SANDBOX_RUNNER_IMAGE:-ghcr.io/codesearchvuln/vulhunter-sandbox-runner@sha256:bc8065dab8883a5525f4e9a72440c9235dd18009fcd84bb6e9eef1baf94c79c9}
      FLOW_PARSER_RUNNER_ENABLED: "${FLOW_PARSER_RUNNER_ENABLED:-true}"
      FLOW_PARSER_RUNNER_TIMEOUT_SECONDS: "${FLOW_PARSER_RUNNER_TIMEOUT_SECONDS:-120}"
      FLOW_PARSER_RUNNER_BATCH_MAX_FILES: "${FLOW_PARSER_RUNNER_BATCH_MAX_FILES:-100}"
      FLOW_PARSER_RUNNER_BATCH_MAX_BYTES: "${FLOW_PARSER_RUNNER_BATCH_MAX_BYTES:-8388608}"
      YASA_TIMEOUT_SECONDS: ${YASA_TIMEOUT_SECONDS:-600}
      GIT_MIRROR_ENABLED: ${GIT_MIRROR_ENABLED:-true}
      GIT_MIRROR_PREFIX: ${GIT_MIRROR_PREFIX:-https://gh-proxy.org}
      GIT_MIRROR_PREFIXES: ${GIT_MIRROR_PREFIXES:-https://gh-proxy.org,https://v6.gh-proxy.org}
      GIT_MIRROR_HOSTS: ${GIT_MIRROR_HOSTS:-github.com}
      GIT_MIRROR_ALLOW_AUTH_URL: ${GIT_MIRROR_ALLOW_AUTH_URL:-false}
      GIT_MIRROR_FALLBACK_TO_ORIGIN: ${GIT_MIRROR_FALLBACK_TO_ORIGIN:-false}
      XDG_DATA_HOME: /app/data/runtime/xdg-data
      XDG_CACHE_HOME: /app/data/runtime/xdg-cache
      XDG_CONFIG_HOME: /app/data/runtime/xdg-config
      DOCKER_HOST: ${DOCKER_HOST:-}
      CONTAINER_CLI: ${CONTAINER_CLI:-docker}
      HTTP_PROXY: ""
      HTTPS_PROXY: ""
      http_proxy: ""
      https_proxy: ""
      NO_PROXY: "*"
    healthcheck:
      test:
        - "CMD"
        - "/opt/backend-venv/bin/python"
        - "-c"
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)"
      interval: 5s
      timeout: 5s
      start_period: 180s
      retries: 120
    depends_on:
      db:
        condition: service_healthy
      db-bootstrap:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      scan-workspace-init:
        condition: service_healthy
    networks:
      - vulhunter-network

  frontend:
    image: ${STATIC_FRONTEND_IMAGE:-docker.io/library/nginx:1.27-alpine@sha256:65645c7bb6a0661892a8b03b89d0743208a18dd2f3f17a54ef4b76fb8e2f2a10}
    restart: unless-stopped
    volumes:
      - ./deploy/runtime/frontend/site:/usr/share/nginx/html:ro
      - ./deploy/runtime/frontend/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nexus-itemDetail/dist:/srv/nexus-item-detail:ro
    ports:
      - "${VULHUNTER_FRONTEND_PORT:-3000}:80"
    depends_on:
      backend:
        condition: service_healthy
      nexus-web:
        condition: service_started
    networks:
      - vulhunter-network

  nexus-web:
    image: ${NEXUS_WEB_IMAGE:-ghcr.io/codesearchvuln/vulhunter-nexus-web@sha256:a5a4e474b20b835a8e8438700dda670a7388588e4fa0dcc890a422a9933098e5}
    restart: unless-stopped
    ports:
      - "${VULHUNTER_NEXUS_WEB_PORT:-5174}:5174"
    networks:
      - vulhunter-network

  redis:
    image: ${REDIS_IMAGE:-docker.io/library/redis:7-alpine@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99}
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vulhunter-network

  adminer:
    image: ${ADMINER_IMAGE:-docker.io/library/adminer:latest@sha256:cc64d253db4f016cbcff2ff2f01e60ed07e74f38b4398f84d3c4fae4b5ce0e07}
    restart: unless-stopped
    profiles: [ "tools" ]
    ports:
      - "8081:8080"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - vulhunter-network

networks:
  vulhunter-network:
    driver: bridge

volumes:
  postgres_data:
  backend_uploads:
  backend_runtime_data:
  scan_workspace:
    name: ${SCAN_WORKSPACE_VOLUME:-vulhunter_scan_workspace}
  redis_data:
