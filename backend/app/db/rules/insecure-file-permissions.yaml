rules:
- id: insecure-file-permissions
  patterns:
  - pattern-either:
    - pattern: os.chmod($FILENAME, $MODE, ...)
    - pattern: os.lchmod($FILENAME, $MODE)
    - pattern: os.fchmod($FD, $MODE)
  - pattern-where-python: "import stat\n\ndef stat_to_bits(mode):\n  bits = 0\n  for\
      \ flag in mode.split('|'):\n    try:\n      bits |= {k: v for k, v in stat.__dict__.items()\
      \ if type(v) == int}[flag.strip().replace(\"stat.\", \"\")]\n    except: # ignore\
      \ things that aren't in stat module\n      continue\n  return bits\n\ndef numeric_to_bits(mode):\n\
      \  # Try combos of ints: 0o777, 511, 0x1ff\n  bits = 0\n  for num in mode.split(\"\
      |\"):\n    num = num.strip()\n    try:\n      tidbit = int(num)\n    except:\n\
      \      try:\n        tidbit = int(num, 8)\n      except:\n        try:\n   \
      \       tidbit = int(num, 16)\n        except:\n          try:\n           \
      \ tidbit = int(num, 2)\n          except:\n            tidbit = 0\n    bits\
      \ |= tidbit\n  return bits\n\nperms = vars['$MODE']\ntry:\n  if \"stat\" in\
      \ perms:\n    mode = stat_to_bits(perms)\n  else:\n    mode = numeric_to_bits(perms)\n\
      except:\n  mode = 0 # can't resolve. ignore this.\n\nfilemode = stat.filemode(mode)\n\
      alert = False\nif 'w' in filemode[-3:] or 'x' in filemode[-3:]:\n  alert = True\n\
      elif 'x' in filemode[-6:-3]:\n  alert = True\nalert"
  message: 'Insecure file permissions detected.

    '
  languages:
  - python
  severity: WARNING
