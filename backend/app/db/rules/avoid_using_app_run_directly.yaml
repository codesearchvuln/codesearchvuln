rules:
- id: avoid_using_app_run_directly_1
  languages:
  - python
  message: top-level app.run(...) is ignored by flask. Consider putting app.run(...)
    behind a guard, like inside a function
  metadata:
    category: security
    confidence: MEDIUM
    cwe:
    - 'CWE-668: Exposure of Resource to Wrong Sphere'
    impact: MEDIUM
    likelihood: LOW
    owasp:
    - A01:2021 - Broken Access Control
    references:
    - https://owasp.org/Top10/A01_2021-Broken_Access_Control
    subcategory:
    - vuln
    technology:
    - flask
  patterns:
  - pattern-not-inside: "if __name__ == '__main__':\n  ...\n"
  - pattern-not-inside: "def $X(...):\n  ...\n"
  - pattern: app.run(...)
  severity: WARNING
