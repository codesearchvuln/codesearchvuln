      primary_id: PHPCS_SecurityAudit.BadFunctions.CryptoFunctions.WarnCryptoFunc
      id: phpcs_security_audit.PHPCS_SecurityAudit.BadFunctions.CryptoFunctions.WarnCryptoFunc-Mcrypt
  - id: PHPCS_SecurityAudit.BadFunctions.CryptoFunctions.WarnCryptoFunc
    rules:
    - path: rules/lgpl-cc/php/crypto/rule-weak-crypto
      primary_id: PHPCS_SecurityAudit.BadFunctions.CryptoFunctions.WarnCryptoFunc
      id: phpcs_security_audit.PHPCS_SecurityAudit.BadFunctions.CryptoFunctions.WarnCryptoFunc-WeakCrypto
