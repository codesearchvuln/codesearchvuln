phpcs_security_audit:
  native_id:
    type: phpcs_security_audit_source
    name: PHPCS Security Audit Test ID $ID
    value: $ID
  mappings:
  - id: PHPCS_SecurityAudit.BadFunctions.Asserts.WarnFunctionHandling
    rules:
    - path: rules/lgpl-cc/php/assert/rule-assert-use
      primary_id: PHPCS_SecurityAudit.BadFunctions.Asserts.WarnFunctionHandling
      id: phpcs_security_audit.PHPCS_SecurityAudit.BadFunctions.Asserts.WarnFunctionHandling
  - id: PHPCS_SecurityAudit.BadFunctions.Backticks.WarnSystemExec
    rules:
    - path: rules/lgpl-cc/php/backticks/rule-backticks-use
      primary_id: PHPCS_SecurityAudit.BadFunctions.Backticks.WarnSystemExec
      id: phpcs_security_audit.PHPCS_SecurityAudit.BadFunctions.Backticks.WarnSystemExec
  - id: PHPCS_SecurityAudit.BadFunctions.NoEvals.NoEvals
    rules:
    - path: rules/lgpl-cc/php/eval/rule-eval-use
      primary_id: PHPCS_SecurityAudit.BadFunctions.NoEvals.NoEvals
      id: phpcs_security_audit.PHPCS_SecurityAudit.BadFunctions.NoEvals.NoEvals
  - id: PHPCS_SecurityAudit.BadFunctions.SystemExecFunctions.WarnSystemExec
    rules:
    - path: rules/lgpl-cc/php/exec/rule-exec-use
      primary_id: PHPCS_SecurityAudit.BadFunctions.SystemExecFunctions.WarnSystemExec
