      primary_id: PHPCS_SecurityAudit.BadFunctions.FilesystemFunctions.WarnFilesystem
      id: phpcs_security_audit.PHPCS_SecurityAudit.BadFunctions.FilesystemFunctions.WarnFilesystem
  - id: PHPCS_SecurityAudit.BadFunctions.FringeFunctions.WarnFringestuff
    rules:
    - path: rules/lgpl-cc/php/ftp/rule-ftp-use
      primary_id: PHPCS_SecurityAudit.BadFunctions.FringeFunctions.WarnFringestuff
      id: phpcs_security_audit.PHPCS_SecurityAudit.BadFunctions.FringeFunctions.WarnFringestuff
  - id: PHPCS_SecurityAudit.BadFunctions.Phpinfos.WarnPhpinfo
    rules:
    - path: rules/lgpl-cc/php/phpinfo/rule-phpinfo-use
      primary_id: PHPCS_SecurityAudit.BadFunctions.Phpinfos.WarnPhpinfo
      id: phpcs_security_audit.PHPCS_SecurityAudit.BadFunctions.Phpinfos.WarnPhpinfo
  - id: PHPCS_SecurityAudit.BadFunctions.CryptoFunctions.WarnCryptoFunc
    rules:
