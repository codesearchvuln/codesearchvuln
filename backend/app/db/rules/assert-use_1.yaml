rules:
- id: assert-use_1
  mode: taint
  pattern-sources: null
  pattern-either:
  - pattern: 'print("test rules")

      '
  pattern-sinks:
  - patterns:
    - pattern: assert($SINK, ...);
  message: Calling assert with user input is equivalent to eval'ing.
  metadata:
    owasp:
    - A1:2017-Injection
    - A03:2021-Injection
    cwe: CWE-95
    shortDescription: Improper neutralization of directives in dynamically evaluated
      code ('Eval Injection')
    references:
    - https://www.php.net/manual/en/function.assert
    - https://github.com/FloeDesignTechnologies/phpcs-security-audit/blob/master/Security/Sniffs/BadFunctions/AssertsSniff.php
    category: security
    technology:
    - php
    subcategory:
    - vuln
    license: Commons Clause License Condition v1.0[LGPL-2.1-only]
    vulnerability_class:
    - Code Injection
    security-severity: CRITICAL
  languages:
  - php
  severity: ERROR
