# =============================================
# VulHunter self-contained-image 兼容覆盖层
# =============================================
# 用法:
# docker compose -f docker-compose.yml -f docker-compose.self-contained.yml up -d
#
# 说明:
#   基础 compose 已默认采用核心栈镜像优先路径。
#   该文件仅保留兼容入口，继续显式固定 backend fallback build 上下文。

services:
  backend:
    volumes: !override
      - ./docker/env/backend:/docker/env/backend
      - backend_uploads:/app/uploads
      - backend_runtime_data:/app/data/runtime
      - scan_workspace:/tmp/vulhunter/scans
      - ${DOCKER_SOCKET_PATH:-/var/run/docker.sock}:/var/run/docker.sock
    environment:
      RUNNER_PREFLIGHT_BUILD_CONTEXT: /opt/backend-build-context
