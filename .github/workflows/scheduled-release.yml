name: 定时发布

on:
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  publish-runtime-release:
    name: 刷新运行时镜像并重建 release 分支
    runs-on: ubuntu-latest

    steps:
      - name: 触发 Release Branch 工作流
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run release.yml \
            --ref main \
            -f refresh_all_runtime_images=true

          echo "已触发 release.yml 刷新运行时镜像并重建 release 分支。"
