name: Release Branch

on:
  workflow_run:
    workflows:
      - Docker Publish
    branches:
      - main
    types:
      - completed
  workflow_dispatch:
    inputs:
      refresh_all_runtime_images:
        description: 'Rebuild runtime runner images before generating release'
        required: false
        type: boolean
        default: false
      refresh_backend_image:
        description: 'Rebuild the default backend image before generating release'
        required: false
        type: boolean
        default: false
      publish_backend_hardened:
        description: 'Publish the hardened backend image variant alongside the default backend image'
        required: false
        type: boolean
        default: false

concurrency:
  group: release-branch-${{ github.event.workflow_run.head_branch || github.ref_name || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: write
  actions: write

jobs:
  prepare-release:
    if: ${{ github.event_name != 'workflow_run' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push') }}
    runs-on: ubuntu-latest
    outputs:
      source_ref: ${{ steps.vars.outputs.source_ref }}
      source_sha: ${{ steps.vars.outputs.source_sha }}
      tag: ${{ steps.vars.outputs.tag }}

    steps:
      - name: 计算 release 源信息
        id: vars
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_run" ]]; then
            echo "source_ref=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
            echo "source_sha=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "source_ref=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
            echo "source_sha=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          fi

          echo "tag=latest" >> "$GITHUB_OUTPUT"

  publish-runtime-images:
    needs: prepare-release
    uses: ./.github/workflows/publish-runtime-images.yml
    secrets: inherit
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    with:
      tag: ${{ needs.prepare-release.outputs.tag }}
      build_frontend: false
      build_backend: ${{ github.event_name == 'workflow_dispatch' && (inputs.refresh_backend_image || inputs.refresh_all_runtime_images) || false }}
      publish_backend_hardened: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_backend_hardened || false }}
      build_yasa_runner: ${{ github.event_name == 'workflow_dispatch' && inputs.refresh_all_runtime_images || false }}
      build_opengrep_runner: ${{ github.event_name == 'workflow_dispatch' && inputs.refresh_all_runtime_images || false }}
      build_bandit_runner: ${{ github.event_name == 'workflow_dispatch' && inputs.refresh_all_runtime_images || false }}
      build_gitleaks_runner: ${{ github.event_name == 'workflow_dispatch' && inputs.refresh_all_runtime_images || false }}
      build_phpstan_runner: ${{ github.event_name == 'workflow_dispatch' && inputs.refresh_all_runtime_images || false }}
      build_flow_parser_runner: ${{ github.event_name == 'workflow_dispatch' && inputs.refresh_all_runtime_images || false }}
      build_pmd_runner: ${{ github.event_name == 'workflow_dispatch' && inputs.refresh_all_runtime_images || false }}
      build_sandbox_runner: ${{ github.event_name == 'workflow_dispatch' && inputs.refresh_all_runtime_images || false }}
      multi_arch: true
      emit_release_manifest: true
      require_complete_manifest: true
      revision: ${{ needs.prepare-release.outputs.source_sha }}

  build-frontend-bundle:
    needs: prepare-release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout release source
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare-release.outputs.source_ref }}
          fetch-depth: 0

      - name: Setup pnpm for frontend release bundle
        uses: pnpm/action-setup@v5
        with:
          package_json_file: frontend/package.json
          run_install: false

      - name: Setup Node.js for frontend release bundle
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Build frontend static release bundle
        run: |
          set -euo pipefail

          cd frontend
          pnpm install --frozen-lockfile
          pnpm build

          FRONTEND_BUNDLE_DIR="${RUNNER_TEMP}/frontend-release-bundle"
          rm -rf "${FRONTEND_BUNDLE_DIR}"
          mkdir -p "${FRONTEND_BUNDLE_DIR}/site" "${FRONTEND_BUNDLE_DIR}/nginx"
          cp -R dist/. "${FRONTEND_BUNDLE_DIR}/site/"
          cp nginx.conf "${FRONTEND_BUNDLE_DIR}/nginx/default.conf"

      - name: Upload frontend release bundle
        uses: actions/upload-artifact@v4
        with:
          name: frontend-release-bundle
          path: ${{ runner.temp }}/frontend-release-bundle
          if-no-files-found: error

  assemble-release-tree:
    needs:
      - prepare-release
      - publish-runtime-images
      - build-frontend-bundle
    runs-on: ubuntu-latest

    steps:
      - name: Checkout release source
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare-release.outputs.source_ref }}
          fetch-depth: 0

      - name: Download frontend release bundle
        uses: actions/download-artifact@v4
        with:
          name: frontend-release-bundle
          path: ${{ runner.temp }}/frontend-release-bundle

      - name: Write release-manifest.json
        run: |
          printf '%s\n' '${{ needs.publish-runtime-images.outputs.release_manifest }}' > "${RUNNER_TEMP}/release-manifest.json"

      - name: Generate runtime release tree
        run: |
          ./scripts/generate-release-branch.sh \
            --output "${RUNNER_TEMP}/release-tree" \
            --image-manifest "${RUNNER_TEMP}/release-manifest.json" \
            --frontend-bundle "${RUNNER_TEMP}/frontend-release-bundle" \
            --validate

      - name: Upload release tree
        uses: actions/upload-artifact@v4
        with:
          name: release-tree
          path: ${{ runner.temp }}/release-tree
          if-no-files-found: error

  package-offline-images:
    needs:
      - prepare-release
      - publish-runtime-images
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        bundle:
          - services
          - scanner
        arch:
          - amd64
          - arm64

    steps:
      - name: Checkout release source
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare-release.outputs.source_ref }}
          fetch-depth: 0

      - name: 登录到 GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Write release-manifest.json
        run: |
          printf '%s\n' '${{ needs.publish-runtime-images.outputs.release_manifest }}' > "${RUNNER_TEMP}/release-manifest.json"

      - name: Package offline image bundle
        run: |
          ./scripts/package-release-images.sh \
            --image-manifest "${RUNNER_TEMP}/release-manifest.json" \
            --output-dir "${RUNNER_TEMP}/release-assets" \
            --bundle ${{ matrix.bundle }} \
            --arch ${{ matrix.arch }}

      - name: Upload offline image bundle
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-${{ matrix.bundle }}-${{ matrix.arch }}
          compression-level: 0
          path: |
            ${{ runner.temp }}/release-assets/vulhunter-${{ matrix.bundle }}-images-${{ matrix.arch }}.tar.zst
            ${{ runner.temp }}/release-assets/images-manifest-${{ matrix.bundle }}-${{ matrix.arch }}.json
          if-no-files-found: error

  smoke-test-release-tree:
    needs: assemble-release-tree
    runs-on: ubuntu-latest

    steps:
      - name: Download release tree
        uses: actions/download-artifact@v4
        with:
          name: release-tree
          path: ${{ runner.temp }}/release-tree

      - name: Validate compose entrypoint
        working-directory: ${{ runner.temp }}/release-tree
        run: |
          export DOCKER_SOCKET_PATH="${DOCKER_SOCKET_PATH:-/var/run/docker.sock}"
          if [[ -S "${DOCKER_SOCKET_PATH}" ]]; then
            export DOCKER_SOCKET_GID="$(stat -c '%g' "${DOCKER_SOCKET_PATH}")"
          fi
          docker compose config >/dev/null

      - name: Smoke test release runtime
        working-directory: ${{ runner.temp }}/release-tree
        run: |
          set -euo pipefail

          export DOCKER_SOCKET_PATH="${DOCKER_SOCKET_PATH:-/var/run/docker.sock}"
          if [[ -S "${DOCKER_SOCKET_PATH}" ]]; then
            export DOCKER_SOCKET_GID="$(stat -c '%g' "${DOCKER_SOCKET_PATH}")"
          fi

          service_cid() {
            docker compose ps -q "$1"
          }

          service_status() {
            local cid
            cid="$(service_cid "$1")"
            if [[ -z "${cid}" ]]; then
              echo "missing"
              return 0
            fi
            docker inspect --format '{{.State.Status}}' "${cid}" 2>/dev/null || echo "unknown"
          }

          service_health() {
            local cid
            cid="$(service_cid "$1")"
            if [[ -z "${cid}" ]]; then
              echo "missing"
              return 0
            fi
            docker inspect --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}' "${cid}" 2>/dev/null || echo "unknown"
          }

          dump_debug() {
            docker compose ps || true
            docker compose logs backend frontend || true
          }

          cleanup() {
            docker compose down -v || true
          }
          trap cleanup EXIT

          docker compose up -d db redis backend
          backend_ready=false
          for attempt in $(seq 1 60); do
            backend_status="$(service_status backend)"
            backend_health="$(service_health backend)"
            if [[ "${backend_status}" == "running" && "${backend_health}" == "healthy" ]] && \
               curl -fsS http://127.0.0.1:8000/health >/dev/null 2>&1; then
              backend_ready=true
              break
            fi
            if [[ "${backend_status}" == "exited" || "${backend_status}" == "dead" || "${backend_health}" == "unhealthy" ]]; then
              break
            fi
            sleep 5
          done
          if [[ "${backend_ready}" != "true" ]]; then
            dump_debug
            echo "::error::Release backend failed to become ready for generated release tree."
            exit 1
          fi

          docker compose up -d frontend
          frontend_ready=false
          for attempt in $(seq 1 12); do
            backend_status="$(service_status backend)"
            backend_health="$(service_health backend)"
            frontend_status="$(service_status frontend)"
            if [[ "${backend_status}" == "running" && "${backend_health}" == "healthy" ]] && \
               curl -fsS http://127.0.0.1:8000/health >/dev/null 2>&1 && \
               curl -fsS http://127.0.0.1:3000/ >/dev/null 2>&1; then
              frontend_ready=true
              break
            fi
            if [[ "${backend_status}" != "running" || "${backend_health}" != "healthy" || "${frontend_status}" == "exited" || "${frontend_status}" == "dead" ]]; then
              break
            fi
            sleep 5
          done
          if [[ "${frontend_ready}" != "true" ]]; then
            dump_debug
            echo "::error::Release frontend/backend failed readiness verification for generated release tree."
            exit 1
          fi
          exit 0

  publish-release-assets-and-branch:
    needs:
      - prepare-release
      - assemble-release-tree
      - package-offline-images
      - smoke-test-release-tree
    runs-on: ubuntu-latest

    steps:
      - name: Checkout release source
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare-release.outputs.source_ref }}
          fetch-depth: 0

      - name: Download release tree
        uses: actions/download-artifact@v4
        with:
          name: release-tree
          path: ${{ runner.temp }}/release-tree

      - name: Download services amd64 offline assets
        uses: actions/download-artifact@v4
        with:
          name: release-assets-services-amd64
          path: ${{ runner.temp }}/release-assets

      - name: Download services arm64 offline assets
        uses: actions/download-artifact@v4
        with:
          name: release-assets-services-arm64
          path: ${{ runner.temp }}/release-assets

      - name: Download scanner amd64 offline assets
        uses: actions/download-artifact@v4
        with:
          name: release-assets-scanner-amd64
          path: ${{ runner.temp }}/release-assets

      - name: Download scanner arm64 offline assets
        uses: actions/download-artifact@v4
        with:
          name: release-assets-scanner-arm64
          path: ${{ runner.temp }}/release-assets

      - name: Delete public release tags and releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CLEANUP_FILE: scripts/release-tag-cleanup.txt
        run: |
          set -euo pipefail

          if [[ ! -f "${CLEANUP_FILE}" ]]; then
            echo "No release tag cleanup file found; skipping."
            exit 0
          fi

          while IFS= read -r raw_tag || [[ -n "${raw_tag}" ]]; do
            tag="$(printf '%s' "${raw_tag}" | sed 's/[[:space:]]*#.*$//; s/^[[:space:]]*//; s/[[:space:]]*$//')"
            [[ -n "${tag}" ]] || continue

            if git ls-remote --tags --refs origin "refs/tags/${tag}" | grep -q .; then
              release_id=""
              if release_id="$(gh api -X GET "repos/${GITHUB_REPOSITORY}/releases/tags/${tag}" --jq '.id' 2>/dev/null)"; then
                if [[ "${release_id}" =~ ^[0-9]+$ ]]; then
                  gh api -X DELETE "repos/${GITHUB_REPOSITORY}/releases/${release_id}"
                fi
              fi
              git push origin --delete "${tag}" || true
            fi

            git tag -d "${tag}" >/dev/null 2>&1 || true
          done < "${CLEANUP_FILE}"

      - name: Publish offline release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ASSET_TAG: release-assets-latest
          ASSET_DIR: ${{ runner.temp }}/release-assets
        run: |
          set -euo pipefail

          if gh release view "${ASSET_TAG}" >/dev/null 2>&1; then
            gh release delete "${ASSET_TAG}" --cleanup-tag --yes
          fi

          git tag -f "${ASSET_TAG}" "${{ needs.prepare-release.outputs.source_sha }}"
          git push --force origin "refs/tags/${ASSET_TAG}"

          gh release create "${ASSET_TAG}" \
            --title "VulHunter Offline Image Bundles" \
            --notes "Offline runtime image bundles for the latest release branch snapshot."

          gh release upload "${ASSET_TAG}" \
            "${ASSET_DIR}/vulhunter-services-images-amd64.tar.zst" \
            "${ASSET_DIR}/vulhunter-services-images-arm64.tar.zst" \
            "${ASSET_DIR}/vulhunter-scanner-images-amd64.tar.zst" \
            "${ASSET_DIR}/vulhunter-scanner-images-arm64.tar.zst" \
            "${ASSET_DIR}/images-manifest-services-amd64.json" \
            "${ASSET_DIR}/images-manifest-services-arm64.json" \
            "${ASSET_DIR}/images-manifest-scanner-amd64.json" \
            "${ASSET_DIR}/images-manifest-scanner-arm64.json" \
            --clobber

      - name: Publish release branch
        env:
          RELEASE_DIR: ${{ runner.temp }}/release-tree
        run: |
          set -euo pipefail

          PUBLISH_DIR="${RUNNER_TEMP}/release-publish"
          git worktree add --detach --force "${PUBLISH_DIR}" HEAD

          cleanup() {
            git worktree remove --force "${PUBLISH_DIR}" || true
          }
          trap cleanup EXIT

          cd "${PUBLISH_DIR}"

          git checkout --orphan "release-publish-${GITHUB_RUN_ID}"

          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -a "${RELEASE_DIR}/." .

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A

          git commit -m "chore: refresh release branch snapshot"
          git push --force origin HEAD:release
