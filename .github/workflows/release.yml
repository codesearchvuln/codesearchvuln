name: Release Branch

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      refresh_all_runtime_images:
        description: 'Rebuild runner and sandbox runtime images before generating release'
        required: false
        type: boolean
        default: false

concurrency:
  group: release-branch
  cancel-in-progress: true

permissions:
  contents: write
  packages: write
  actions: write

jobs:
  publish-runtime-images:
    uses: ./.github/workflows/publish-runtime-images.yml
    secrets: inherit
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    with:
      tag: latest
      build_frontend: true
      build_backend: true
      build_yasa_runner: ${{ github.event_name == 'workflow_dispatch' && inputs.refresh_all_runtime_images || false }}
      build_opengrep_runner: ${{ github.event_name == 'workflow_dispatch' && inputs.refresh_all_runtime_images || false }}
      build_bandit_runner: ${{ github.event_name == 'workflow_dispatch' && inputs.refresh_all_runtime_images || false }}
      build_gitleaks_runner: ${{ github.event_name == 'workflow_dispatch' && inputs.refresh_all_runtime_images || false }}
      build_phpstan_runner: ${{ github.event_name == 'workflow_dispatch' && inputs.refresh_all_runtime_images || false }}
      build_flow_parser_runner: ${{ github.event_name == 'workflow_dispatch' && inputs.refresh_all_runtime_images || false }}
      build_pmd_runner: ${{ github.event_name == 'workflow_dispatch' && inputs.refresh_all_runtime_images || false }}
      build_sandbox: ${{ github.event_name == 'workflow_dispatch' && inputs.refresh_all_runtime_images || false }}
      build_sandbox_runner: ${{ github.event_name == 'workflow_dispatch' && inputs.refresh_all_runtime_images || false }}
      multi_arch: true
      emit_release_manifest: true
      require_complete_manifest: true

  generate-release-branch:
    runs-on: ubuntu-latest
    needs: publish-runtime-images

    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 登录到 GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Write release-manifest.json
        run: |
          printf '%s\n' '${{ needs.publish-runtime-images.outputs.release_manifest }}' > "${RUNNER_TEMP}/release-manifest.json"

      - name: Generate runtime release tree
        run: |
          ./scripts/generate-release-branch.sh \
            --output "${RUNNER_TEMP}/release-tree" \
            --image-manifest "${RUNNER_TEMP}/release-manifest.json" \
            --validate

      - name: Package offline image bundles
        run: |
          ./scripts/package-release-images.sh \
            --image-manifest "${RUNNER_TEMP}/release-manifest.json" \
            --output-dir "${RUNNER_TEMP}/release-assets"

      - name: Validate compose entrypoint
        working-directory: ${{ runner.temp }}/release-tree
        run: |
          docker compose config >/dev/null

      - name: Smoke test backend runtime
        working-directory: ${{ runner.temp }}/release-tree
        run: |
          set -euo pipefail

          cleanup() {
            docker compose down -v || true
          }
          trap cleanup EXIT

          docker compose up -d db redis backend
          for attempt in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:8000/health >/dev/null 2>&1; then
              exit 0
            fi
            sleep 5
          done

          docker compose logs backend
          echo "::error::Backend health check failed for generated release tree."
          exit 1

      - name: Delete public release tags and releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CLEANUP_FILE: scripts/release-tag-cleanup.txt
        run: |
          set -euo pipefail

          if [[ ! -f "${CLEANUP_FILE}" ]]; then
            echo "No release tag cleanup file found; skipping."
            exit 0
          fi

          while IFS= read -r raw_tag || [[ -n "${raw_tag}" ]]; do
            tag="$(printf '%s' "${raw_tag}" | sed 's/[[:space:]]*#.*$//; s/^[[:space:]]*//; s/[[:space:]]*$//')"
            [[ -n "${tag}" ]] || continue

            if git ls-remote --tags --refs origin "refs/tags/${tag}" | grep -q .; then
              release_id=""
              if release_id="$(gh api -X GET "repos/${GITHUB_REPOSITORY}/releases/tags/${tag}" --jq '.id' 2>/dev/null)"; then
                if [[ "${release_id}" =~ ^[0-9]+$ ]]; then
                  gh api -X DELETE "repos/${GITHUB_REPOSITORY}/releases/${release_id}"
                fi
              fi
              git push origin --delete "${tag}" || true
            fi

            git tag -d "${tag}" >/dev/null 2>&1 || true
          done < "${CLEANUP_FILE}"

      - name: Publish offline release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ASSET_TAG: release-assets-latest
          ASSET_DIR: ${{ runner.temp }}/release-assets
        run: |
          set -euo pipefail

          if gh release view "${ASSET_TAG}" >/dev/null 2>&1; then
            gh release delete "${ASSET_TAG}" --cleanup-tag --yes
          fi

          git tag -f "${ASSET_TAG}" "${GITHUB_SHA}"
          git push --force origin "refs/tags/${ASSET_TAG}"

          gh release create "${ASSET_TAG}" \
            --title "VulHunter Offline Image Bundles" \
            --notes "Offline runtime image bundles for the latest release branch snapshot."

          gh release upload "${ASSET_TAG}" \
            "${ASSET_DIR}/vulhunter-images-amd64.tar.zst" \
            "${ASSET_DIR}/vulhunter-images-arm64.tar.zst" \
            "${ASSET_DIR}/images-manifest-amd64.json" \
            "${ASSET_DIR}/images-manifest-arm64.json" \
            --clobber

      - name: Publish release branch
        env:
          RELEASE_DIR: ${{ runner.temp }}/release-tree
        run: |
          set -euo pipefail

          PUBLISH_DIR="${RUNNER_TEMP}/release-publish"
          git worktree add --detach --force "${PUBLISH_DIR}" HEAD

          cleanup() {
            git worktree remove --force "${PUBLISH_DIR}" || true
          }
          trap cleanup EXIT

          cd "${PUBLISH_DIR}"

          git checkout --orphan "release-publish-${GITHUB_RUN_ID}"

          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -a "${RELEASE_DIR}/." .

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A

          git commit -m "chore: refresh release branch snapshot"
          git push --force origin HEAD:release
