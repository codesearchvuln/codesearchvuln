name: Docker Publish

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**/tests/**'
      - '**/docs/**'
      - 'tests/**'
      - 'docs/**'
  workflow_dispatch:
    inputs:
      tag:
        description: '镜像标签 (例如: latest, dev, v3.0.0)'
        required: true
        default: 'latest'
        type: string
      build_frontend:
        description: '构建前端镜像'
        required: false
        type: boolean
        default: true
      build_backend:
        description: '构建后端镜像'
        required: false
        type: boolean
        default: true
      publish_backend_hardened:
        description: '额外发布可选 hardened 后端镜像（默认 backend 仍为 runtime-plain）'
        required: false
        type: boolean
        default: false
      build_yasa_runner:
        description: '构建 YASA runner 镜像'
        required: false
        type: boolean
        default: false
      build_opengrep_runner:
        description: '构建 OpenGrep runner 镜像'
        required: false
        type: boolean
        default: false
      build_bandit_runner:
        description: '构建 Bandit runner 镜像'
        required: false
        type: boolean
        default: false
      build_gitleaks_runner:
        description: '构建 Gitleaks runner 镜像'
        required: false
        type: boolean
        default: false
      build_phpstan_runner:
        description: '构建 PHPStan runner 镜像'
        required: false
        type: boolean
        default: false
      build_flow_parser_runner:
        description: '构建 flow/parser runner 镜像'
        required: false
        type: boolean
        default: false
      build_pmd_runner:
        description: '构建 PMD runner 镜像'
        required: false
        type: boolean
        default: false
      build_sandbox_runner:
        description: '构建 sandbox-runner 镜像'
        required: false
        type: boolean
        default: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    name: 检测镜像相关变更
    runs-on: ubuntu-latest
    timeout-minutes: 5

    outputs:
      frontend: ${{ steps.filter.outputs.frontend || steps.manual.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend || steps.manual.outputs.backend }}

    steps:
      - name: 检出代码
        if: github.event_name == 'push'
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: 识别前后端相关变更
        id: filter
        if: github.event_name == 'push'
        uses: dorny/paths-filter@v3
        with:
          filters: |
            frontend:
              - '.github/workflows/docker-publish.yml'
              - '.github/workflows/publish-runtime-images.yml'
              - 'docker/backend.Dockerfile.dockerignore'
              - 'docker/*.Dockerfile.dockerignore'
              - 'docker/frontend.Dockerfile'
              - 'frontend/**'
            backend:
              - '.github/workflows/docker-publish.yml'
              - '.github/workflows/publish-runtime-images.yml'
              - '.dockerignore'
              - 'docker/backend.Dockerfile.dockerignore'
              - 'docker/*.Dockerfile.dockerignore'
              - 'docker/backend.Dockerfile'
              - 'docker/flow-parser-runner.requirements.txt'
              - 'docker/sandbox-runner.requirements.txt'
              - 'backend/**'
              - 'frontend/yasa-engine-overrides/**'

      - name: workflow_dispatch 默认输出
        id: manual
        if: github.event_name == 'workflow_dispatch'
        run: |
          echo "frontend=false" >> "$GITHUB_OUTPUT"
          echo "backend=false" >> "$GITHUB_OUTPUT"

  publish-runtime-images:
    needs: detect-changes
    uses: ./.github/workflows/publish-runtime-images.yml
    secrets: inherit
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    with:
      tag: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || 'latest' }}
      build_frontend: ${{ github.event_name == 'workflow_dispatch' && inputs.build_frontend || needs.detect-changes.outputs.frontend == 'true' }}
      build_backend: ${{ github.event_name == 'workflow_dispatch' && inputs.build_backend || github.event_name == 'push' || needs.detect-changes.outputs.backend == 'true' }}
      publish_backend_hardened: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_backend_hardened || false }}
      build_yasa_runner: ${{ github.event_name == 'workflow_dispatch' && inputs.build_yasa_runner || false }}
      build_opengrep_runner: ${{ github.event_name == 'workflow_dispatch' && inputs.build_opengrep_runner || false }}
      build_bandit_runner: ${{ github.event_name == 'workflow_dispatch' && inputs.build_bandit_runner || false }}
      build_gitleaks_runner: ${{ github.event_name == 'workflow_dispatch' && inputs.build_gitleaks_runner || false }}
      build_phpstan_runner: ${{ github.event_name == 'workflow_dispatch' && inputs.build_phpstan_runner || false }}
      build_flow_parser_runner: ${{ github.event_name == 'workflow_dispatch' && inputs.build_flow_parser_runner || false }}
      build_pmd_runner: ${{ github.event_name == 'workflow_dispatch' && inputs.build_pmd_runner || false }}
      build_sandbox_runner: ${{ github.event_name == 'workflow_dispatch' && inputs.build_sandbox_runner || false }}
      multi_arch: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'push' }}
      emit_release_manifest: true
      require_complete_manifest: false
      revision: ${{ github.sha }}

  release-branch:
    name: Release Branch
    needs: publish-runtime-images
    if: ${{ always() && needs.publish-runtime-images.result == 'success' && needs.publish-runtime-images.outputs.release_manifest != '' }}
    uses: ./.github/workflows/release.yml
    secrets: inherit
    permissions:
      # GitHub statically validates nested reusable-workflow permissions even when
      # release.yml's publish-runtime-images job is skipped under workflow_call.
      contents: write
      packages: write
      id-token: write
      attestations: write
    with:
      source_sha: ${{ github.sha }}
      release_manifest: ${{ needs.publish-runtime-images.outputs.release_manifest }}
