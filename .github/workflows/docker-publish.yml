name: Docker Publish

on:
  workflow_dispatch:
    inputs:
      tag:
        description: '镜像标签 (例如: latest, dev, v3.0.0)'
        required: true
        default: 'latest'
        type: string
      build_frontend:
        description: '构建前端镜像'
        required: false
        type: boolean
        default: true
      build_backend:
        description: '构建后端镜像'
        required: false
        type: boolean
        default: true
      build_yasa_runner:
        description: '构建 YASA runner 镜像'
        required: false
        type: boolean
        default: false
      build_opengrep_runner:
        description: '构建 OpenGrep runner 镜像'
        required: false
        type: boolean
        default: false
      build_bandit_runner:
        description: '构建 Bandit runner 镜像'
        required: false
        type: boolean
        default: false
      build_gitleaks_runner:
        description: '构建 Gitleaks runner 镜像'
        required: false
        type: boolean
        default: false
      build_phpstan_runner:
        description: '构建 PHPStan runner 镜像'
        required: false
        type: boolean
        default: false
      build_flow_parser_runner:
        description: '构建 flow/parser runner 镜像'
        required: false
        type: boolean
        default: false
      build_pmd_runner:
        description: '构建 PMD runner 镜像'
        required: false
        type: boolean
        default: false
      build_sandbox_runner:
        description: '构建 sandbox-runner 镜像'
        required: false
        type: boolean
        default: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish-runtime-images:
    uses: ./.github/workflows/publish-runtime-images.yml
    secrets: inherit
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    with:
      tag: ${{ inputs.tag }}
      build_frontend: ${{ inputs.build_frontend }}
      build_backend: ${{ inputs.build_backend }}
      build_yasa_runner: ${{ inputs.build_yasa_runner }}
      build_opengrep_runner: ${{ inputs.build_opengrep_runner }}
      build_bandit_runner: ${{ inputs.build_bandit_runner }}
      build_gitleaks_runner: ${{ inputs.build_gitleaks_runner }}
      build_phpstan_runner: ${{ inputs.build_phpstan_runner }}
      build_flow_parser_runner: ${{ inputs.build_flow_parser_runner }}
      build_pmd_runner: ${{ inputs.build_pmd_runner }}
      build_sandbox_runner: ${{ inputs.build_sandbox_runner }}
      multi_arch: true
      emit_release_manifest: true
      require_complete_manifest: false
      revision: ${{ github.sha }}

  upload-release-manifest-artifact:
    name: Upload release manifest artifact
    needs: publish-runtime-images
    if: ${{ always() && needs.publish-runtime-images.result == 'success' && needs.publish-runtime-images.outputs.release_manifest != '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Write release-manifest.json
        env:
          RELEASE_MANIFEST: ${{ needs.publish-runtime-images.outputs.release_manifest }}
        run: |
          set -euo pipefail
          printf '%s\n' "${RELEASE_MANIFEST}" > release-manifest.json

      - name: Upload release-manifest-json artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-manifest-json
          path: release-manifest.json
          if-no-files-found: error
          retention-days: 1
