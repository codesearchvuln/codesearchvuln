name: Publish Sourcecode Branch

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: publish-sourcecode-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  publish-sourcecode:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout source repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate sourcecode tree
        env:
          OUTPUT_DIR: ${{ runner.temp }}/sourcecode-tree
        run: |
          set -euo pipefail

          bash ./scripts/generate-sourcecode-branch.sh \
            --output "${OUTPUT_DIR}" \
            --validate

      - name: Publish sourcecode branch
        env:
          SOURCECODE_DIR: ${{ runner.temp }}/sourcecode-tree
        run: |
          set -euo pipefail

          PUBLISH_DIR="${RUNNER_TEMP}/sourcecode-publish"
          git worktree add --detach --force "${PUBLISH_DIR}" HEAD

          cleanup() {
            git worktree remove --force "${PUBLISH_DIR}" || true
          }
          trap cleanup EXIT

          cd "${PUBLISH_DIR}"
          if git ls-remote --exit-code --heads origin sourcecode >/dev/null 2>&1; then
            git fetch --force origin sourcecode:refs/remotes/origin/sourcecode
            git checkout -B sourcecode origin/sourcecode
          else
            git checkout --orphan "sourcecode-publish-${GITHUB_RUN_ID}"
          fi

          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -a "${SOURCECODE_DIR}/." .

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A

          if git diff --cached --quiet --ignore-submodules --; then
            echo "Sourcecode branch is already up to date; skipping push."
            exit 0
          fi

          git commit -m "chore: refresh sourcecode branch snapshot"
          git push origin HEAD:sourcecode
