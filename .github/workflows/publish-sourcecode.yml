name: Publish Sourcecode Branch

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: publish-sourcecode-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  publish-sourcecode:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout source repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Generate sourcecode tree
        env:
          OUTPUT_DIR: ${{ runner.temp }}/sourcecode-tree
        run: |
          set -euo pipefail

          bash ./scripts/generate-sourcecode-branch.sh \
            --output "${OUTPUT_DIR}" \
            --validate

      - name: Detect sourcecode changes
        id: detect_changes
        env:
          SOURCECODE_DIR: ${{ runner.temp }}/sourcecode-tree
        run: |
          set -euo pipefail

          COMPARE_DIR="${RUNNER_TEMP}/sourcecode-compare"

          git_tree_hash_for_dir() {
            local source_dir="$1"
            local repo_dir="$2"

            rm -rf "${repo_dir}"
            mkdir -p "${repo_dir}"
            git init -q "${repo_dir}"

            if [[ -d "${source_dir}" ]]; then
              cp -a "${source_dir}/." "${repo_dir}/"
            fi

            git -C "${repo_dir}" add -A
            git -C "${repo_dir}" write-tree
          }

          candidate_tree="$(git_tree_hash_for_dir "${SOURCECODE_DIR}" "${COMPARE_DIR}")"
          echo "candidate_tree=${candidate_tree}" >> "$GITHUB_OUTPUT"

          has_changes=true
          if git ls-remote --exit-code --heads origin sourcecode >/dev/null 2>&1; then
            git fetch --force origin sourcecode:refs/remotes/origin/sourcecode
            remote_tree="$(git rev-parse refs/remotes/origin/sourcecode^{tree})"
            if [[ "${candidate_tree}" == "${remote_tree}" ]]; then
              has_changes=false
              echo "Sourcecode branch is already up to date."
            fi
          fi
          echo "has_changes=${has_changes}" >> "$GITHUB_OUTPUT"

      - name: Smoke test sourcecode build
        if: steps.detect_changes.outputs.has_changes == 'true'
        working-directory: ${{ runner.temp }}/sourcecode-tree
        env:
          VULHUNTER_SOURCECODE_PROJECT_NAME: vulhunter-sourcecode-smoke
        run: |
          set -euo pipefail

          export DOCKER_SOCKET_PATH="${DOCKER_SOCKET_PATH:-/var/run/docker.sock}"
          if [[ -S "${DOCKER_SOCKET_PATH}" ]]; then
            export DOCKER_SOCKET_GID="$(stat -c '%g' "${DOCKER_SOCKET_PATH}")"
          fi

          export RUNNER_PREFLIGHT_ENABLED=false

          dump_debug() {
            docker compose \
              -f docker-compose.yml -f docker-compose.full.yml \
              -p "${VULHUNTER_SOURCECODE_PROJECT_NAME}" \
              ps || true
            docker compose \
              -f docker-compose.yml -f docker-compose.full.yml \
              -p "${VULHUNTER_SOURCECODE_PROJECT_NAME}" \
              logs --tail=200 db redis backend frontend || true
          }

          cleanup() {
            docker compose \
              -f docker-compose.yml -f docker-compose.full.yml \
              -p "${VULHUNTER_SOURCECODE_PROJECT_NAME}" \
              down -v || true
          }
          trap cleanup EXIT

          if ! docker compose \
            -f docker-compose.yml -f docker-compose.full.yml \
            -p "${VULHUNTER_SOURCECODE_PROJECT_NAME}" \
            up --build -d --wait --wait-timeout 300; then
            dump_debug
            echo "::error::Sourcecode full build smoke test failed: services did not become healthy."
            exit 1
          fi

      - name: Publish sourcecode branch
        if: steps.detect_changes.outputs.has_changes == 'true'
        env:
          SOURCECODE_DIR: ${{ runner.temp }}/sourcecode-tree
        run: |
          set -euo pipefail

          PUBLISH_DIR="${RUNNER_TEMP}/sourcecode-publish"
          git worktree add --detach --force "${PUBLISH_DIR}" HEAD

          cleanup() {
            git worktree remove --force "${PUBLISH_DIR}" || true
          }
          trap cleanup EXIT

          cd "${PUBLISH_DIR}"
          git checkout --orphan "sourcecode-publish-${GITHUB_RUN_ID}"

          git rm -rf --cached . >/dev/null 2>&1 || true
          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -a "${SOURCECODE_DIR}/." .

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A

          git commit -m "chore: refresh sourcecode branch snapshot"
          git push --force origin HEAD:sourcecode
