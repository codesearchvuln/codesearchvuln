name: Backend DB Contract Smoke

on:
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-migration-smoke.yml"
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend-migration-smoke.yml"

concurrency:
  group: db-contract-smoke-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  db-contract-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: vulhunter
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d vulhunter"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Install backend dependencies
        working-directory: backend
        run: |
          uv sync --frozen --no-dev

      - name: Bootstrap database contract on empty database
        working-directory: backend
        env:
          POSTGRES_SERVER: 127.0.0.1
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: vulhunter
        run: |
          uv run python -m app.runtime.db_contract bootstrap

      - name: Verify database contract after bootstrap
        working-directory: backend
        env:
          POSTGRES_SERVER: 127.0.0.1
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: vulhunter
        run: |
          uv run python -m app.runtime.db_contract check

      - name: Verify Alembic revision files are retired
        working-directory: backend
        run: |
          uv run python - <<'PY2'
          from pathlib import Path

          versions_dir = Path("alembic/versions")
          revision_files = sorted(str(path) for path in versions_dir.glob("*.py")) if versions_dir.exists() else []
          print("revision_files:", revision_files)
          if revision_files:
              raise SystemExit(f"Expected no Alembic revision files, found {revision_files}")
          PY2
