name: Publish Runtime Images

on:
  workflow_call:
    inputs:
      tag:
        description: Runtime image tag to publish or resolve.
        required: false
        type: string
        default: latest
      build_frontend:
        required: false
        type: boolean
        default: false
      build_backend:
        required: false
        type: boolean
        default: false
      publish_backend_hardened:
        required: false
        type: boolean
        default: false
      build_yasa_runner:
        required: false
        type: boolean
        default: false
      build_opengrep_runner:
        required: false
        type: boolean
        default: false
      build_bandit_runner:
        required: false
        type: boolean
        default: false
      build_gitleaks_runner:
        required: false
        type: boolean
        default: false
      build_phpstan_runner:
        required: false
        type: boolean
        default: false
      build_flow_parser_runner:
        required: false
        type: boolean
        default: false
      build_pmd_runner:
        required: false
        type: boolean
        default: false
      build_sandbox_runner:
        required: false
        type: boolean
        default: false
      multi_arch:
        required: false
        type: boolean
        default: false
      emit_release_manifest:
        required: false
        type: boolean
        default: false
      require_complete_manifest:
        required: false
        type: boolean
        default: false
      revision:
        required: false
        type: string
        default: ""
    outputs:
      release_manifest:
        description: Machine-readable manifest with digest-pinned runtime refs.
        value: ${{ jobs.assemble-release-manifest.outputs.release_manifest }}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  GHCR_REGISTRY: ghcr.io
  VULHUNTER_IMAGE_NAMESPACE: unbengable12

jobs:
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      tag: ${{ steps.shared.outputs.tag }}
      platforms: ${{ steps.shared.outputs.platforms }}

    steps:
      - name: 计算共享构建参数
        id: shared
        env:
          INPUT_TAG: ${{ inputs.tag }}
          MULTI_ARCH: ${{ inputs.multi_arch }}
        run: |
          set -euo pipefail

          echo "tag=${INPUT_TAG:-latest}" >> "$GITHUB_OUTPUT"
          if [[ "${MULTI_ARCH}" == "true" ]]; then
            echo "platforms=linux/amd64,linux/arm64" >> "$GITHUB_OUTPUT"
          else
            echo "platforms=linux/amd64" >> "$GITHUB_OUTPUT"
          fi

      - name: 输出发布摘要
        run: |
          echo "## Runtime image publish" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- tag: \`${{ steps.shared.outputs.tag }}\`" >> "$GITHUB_STEP_SUMMARY"

  publish-frontend-amd64:
    name: Publish frontend image (amd64)
    needs: prepare
    if: ${{ inputs.build_frontend }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    outputs:
      tag: ${{ steps.capture.outputs.tag }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v6

      - name: 登录到 GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: 构建并推送 amd64 前端 Docker 镜像
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          file: ./docker/frontend.Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ env.GHCR_REGISTRY }}/${{ env.VULHUNTER_IMAGE_NAMESPACE }}/vulhunter-frontend:${{ needs.prepare.outputs.tag }}-${{ github.run_id }}-${{ github.run_attempt }}-amd64
          cache-from: type=gha,scope=frontend-runtime-amd64
          cache-to: type=gha,mode=max,scope=frontend-runtime-amd64

      - name: 记录 amd64 前端镜像标签
        id: capture
        env:
          IMAGE: ${{ env.GHCR_REGISTRY }}/${{ env.VULHUNTER_IMAGE_NAMESPACE }}/vulhunter-frontend:${{ needs.prepare.outputs.tag }}-${{ github.run_id }}-${{ github.run_attempt }}-amd64
        run: |
          set -euo pipefail
          echo "tag=${IMAGE}" >> "$GITHUB_OUTPUT"

  publish-frontend-arm64:
    name: Publish frontend image (arm64)
    needs: prepare
    if: ${{ inputs.build_frontend && inputs.multi_arch }}
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    outputs:
      tag: ${{ steps.capture.outputs.tag }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v6

      - name: 登录到 GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: 构建并推送 arm64 前端 Docker 镜像
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          file: ./docker/frontend.Dockerfile
          push: true
          platforms: linux/arm64
          tags: ${{ env.GHCR_REGISTRY }}/${{ env.VULHUNTER_IMAGE_NAMESPACE }}/vulhunter-frontend:${{ needs.prepare.outputs.tag }}-${{ github.run_id }}-${{ github.run_attempt }}-arm64
          cache-from: type=gha,scope=frontend-runtime-arm64
          cache-to: type=gha,mode=max,scope=frontend-runtime-arm64

      - name: 记录 arm64 前端镜像标签
        id: capture
        env:
          IMAGE: ${{ env.GHCR_REGISTRY }}/${{ env.VULHUNTER_IMAGE_NAMESPACE }}/vulhunter-frontend:${{ needs.prepare.outputs.tag }}-${{ github.run_id }}-${{ github.run_attempt }}-arm64
        run: |
          set -euo pipefail
          echo "tag=${IMAGE}" >> "$GITHUB_OUTPUT"

  publish-frontend:
    name: Publish frontend image
    needs:
      - prepare
      - publish-frontend-amd64
      - publish-frontend-arm64
    if: ${{ always() && inputs.build_frontend && needs.publish-frontend-amd64.result == 'success' && (needs.publish-frontend-arm64.result == 'success' || needs.publish-frontend-arm64.result == 'skipped') }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    outputs:
      digest: ${{ steps.assemble.outputs.digest }}
      ref: ${{ steps.assemble.outputs.ref }}

    steps:
      - name: 登录到 GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: 组装多架构前端 manifest
        id: assemble
        env:
          IMAGE: ${{ env.GHCR_REGISTRY }}/${{ env.VULHUNTER_IMAGE_NAMESPACE }}/vulhunter-frontend
          IMAGE_TAG: ${{ needs.prepare.outputs.tag }}
          FINAL_TAG: ${{ env.GHCR_REGISTRY }}/${{ env.VULHUNTER_IMAGE_NAMESPACE }}/vulhunter-frontend:${{ needs.prepare.outputs.tag }}
          AMD64_TAG: ${{ needs.publish-frontend-amd64.outputs.tag }}
          ARM64_TAG: ${{ needs.publish-frontend-arm64.outputs.tag }}
          MULTI_ARCH: ${{ inputs.multi_arch }}
          EXPECTED_PLATFORMS: ${{ inputs.multi_arch && 'linux/amd64 linux/arm64' || 'linux/amd64' }}
        run: |
          set -euo pipefail

          if [[ "${MULTI_ARCH}" == "true" ]]; then
            docker buildx imagetools create -t "${FINAL_TAG}" "${AMD64_TAG}" "${ARM64_TAG}"
          else
            docker buildx imagetools create -t "${FINAL_TAG}" "${AMD64_TAG}"
          fi

          digest="$(docker buildx imagetools inspect "${FINAL_TAG}" --format '{{.Manifest.Digest}}')"
          echo "digest=${digest}" >> "$GITHUB_OUTPUT"
          echo "ref=${IMAGE}@${digest}" >> "$GITHUB_OUTPUT"

          raw_json="$(docker buildx imagetools inspect "${FINAL_TAG}" --raw)"
          RAW_JSON="${raw_json}" EXPECTED_PLATFORMS="${EXPECTED_PLATFORMS}" python3 - <<'PY'
          from __future__ import annotations

          import json
          import os

          raw = os.environ["RAW_JSON"]
          data = json.loads(raw)
          manifests = data.get("manifests", [])
          platforms = {
              f"{entry.get('platform', {}).get('os')}/{entry.get('platform', {}).get('architecture')}"
              for entry in manifests
          }
          expected = set(os.environ["EXPECTED_PLATFORMS"].split())
          missing = sorted(expected - platforms)
          if missing:
              raise SystemExit(f"missing manifest platforms: {', '.join(missing)}")
          print(f"validated platforms: {', '.join(sorted(platforms))}")
          PY

  publish-backend-amd64:
    name: Publish backend image (amd64)
    needs: prepare
    if: ${{ inputs.build_backend }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    outputs:
      tag: ${{ steps.capture.outputs.tag }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v6

      - name: 登录到 GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 设置 Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v4

      - name: Restore amd64 cache mounts
        id: cache-mounts-amd64
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache-mounts-runtime-release-amd64
          key: ${{ runner.os }}-backend-runtime-release-amd64-mounts-${{ hashFiles('docker/backend.Dockerfile', 'backend/pyproject.toml', 'backend/uv.lock', 'backend/cython_build/setup.py', 'backend/cython_build/release_allowlist.txt', 'backend/cython_build/release_exclusion_list.txt') }}
          restore-keys: |
            ${{ runner.os }}-backend-runtime-release-amd64-mounts-

      - name: Inject amd64 cache mounts into BuildKit
        uses: reproducible-containers/buildkit-cache-dance@v3
        with:
          builder: ${{ steps.buildx.outputs.name }}
          cache-dir: /tmp/.buildx-cache-mounts-runtime-release-amd64
          dockerfile: docker/backend.Dockerfile
          skip-extraction: ${{ steps.cache-mounts-amd64.outputs.cache-hit }}

      - name: 构建并推送 amd64 后端 Docker 镜像
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./docker/backend.Dockerfile
          target: runtime-release
          push: true
          platforms: linux/amd64
          tags: ${{ env.GHCR_REGISTRY }}/${{ env.VULHUNTER_IMAGE_NAMESPACE }}/vulhunter-backend:${{ needs.prepare.outputs.tag }}-${{ github.run_id }}-${{ github.run_attempt }}-amd64
          build-args: |
            DOCKERHUB_LIBRARY_MIRROR=docker.m.daocloud.io/library
            BACKEND_CYTHON_JOBS=4
            BACKEND_CYTHON_MAX_JOBS=4
            VCS_REF=${{ inputs.revision != '' && inputs.revision || github.sha }}
          cache-from: |
            type=registry,ref=${{ env.GHCR_REGISTRY }}/${{ env.VULHUNTER_IMAGE_NAMESPACE }}/vulhunter-backend:buildcache-runtime-release-amd64
            type=gha,scope=backend-runtime-release-amd64
          cache-to: |
            type=registry,ref=${{ env.GHCR_REGISTRY }}/${{ env.VULHUNTER_IMAGE_NAMESPACE }}/vulhunter-backend:buildcache-runtime-release-amd64,mode=max
            type=gha,mode=max,scope=backend-runtime-release-amd64

      - name: 记录 amd64 后端镜像标签
        id: capture
        env:
          IMAGE: ${{ env.GHCR_REGISTRY }}/${{ env.VULHUNTER_IMAGE_NAMESPACE }}/vulhunter-backend:${{ needs.prepare.outputs.tag }}-${{ github.run_id }}-${{ github.run_attempt }}-amd64
        run: |
          set -euo pipefail
          echo "tag=${IMAGE}" >> "$GITHUB_OUTPUT"

  publish-backend-arm64:
    name: Publish backend image (arm64)
    needs: prepare
    if: ${{ inputs.build_backend && inputs.multi_arch }}
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 45
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    outputs:
      tag: ${{ steps.capture.outputs.tag }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v6

      - name: 登录到 GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 设置 Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v4

      - name: Restore arm64 cache mounts
        id: cache-mounts-arm64
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache-mounts-runtime-release-arm64
          key: ${{ runner.os }}-backend-runtime-release-arm64-mounts-${{ hashFiles('docker/backend.Dockerfile', 'backend/pyproject.toml', 'backend/uv.lock', 'backend/cython_build/setup.py', 'backend/cython_build/release_allowlist.txt', 'backend/cython_build/release_exclusion_list.txt') }}
          restore-keys: |
            ${{ runner.os }}-backend-runtime-release-arm64-mounts-

      - name: Inject arm64 cache mounts into BuildKit
        uses: reproducible-containers/buildkit-cache-dance@v3
        with:
          builder: ${{ steps.buildx.outputs.name }}
          cache-dir: /tmp/.buildx-cache-mounts-runtime-release-arm64
          dockerfile: docker/backend.Dockerfile
          skip-extraction: ${{ steps.cache-mounts-arm64.outputs.cache-hit }}

      - name: 构建并推送 arm64 后端 Docker 镜像
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./docker/backend.Dockerfile
          target: runtime-release
          push: true
          platforms: linux/arm64
          tags: ${{ env.GHCR_REGISTRY }}/${{ env.VULHUNTER_IMAGE_NAMESPACE }}/vulhunter-backend:${{ needs.prepare.outputs.tag }}-${{ github.run_id }}-${{ github.run_attempt }}-arm64
          build-args: |
            DOCKERHUB_LIBRARY_MIRROR=docker.m.daocloud.io/library
            BACKEND_CYTHON_JOBS=4
            BACKEND_CYTHON_MAX_JOBS=4
            VCS_REF=${{ inputs.revision != '' && inputs.revision || github.sha }}
          cache-from: |
            type=registry,ref=${{ env.GHCR_REGISTRY }}/${{ env.VULHUNTER_IMAGE_NAMESPACE }}/vulhunter-backend:buildcache-runtime-release-arm64
            type=gha,scope=backend-runtime-release-arm64
          cache-to: |
            type=registry,ref=${{ env.GHCR_REGISTRY }}/${{ env.VULHUNTER_IMAGE_NAMESPACE }}/vulhunter-backend:buildcache-runtime-release-arm64,mode=max
            type=gha,mode=max,scope=backend-runtime-release-arm64

      - name: 记录 arm64 后端镜像标签
        id: capture
        env:
          IMAGE: ${{ env.GHCR_REGISTRY }}/${{ env.VULHUNTER_IMAGE_NAMESPACE }}/vulhunter-backend:${{ needs.prepare.outputs.tag }}-${{ github.run_id }}-${{ github.run_attempt }}-arm64
        run: |
          set -euo pipefail
          echo "tag=${IMAGE}" >> "$GITHUB_OUTPUT"

  publish-backend:
    name: Publish backend image
    needs:
      - prepare
      - publish-backend-amd64
      - publish-backend-arm64
    if: ${{ always() && inputs.build_backend && needs.publish-backend-amd64.result == 'success' && (needs.publish-backend-arm64.result == 'success' || needs.publish-backend-arm64.result == 'skipped') }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    outputs:
      digest: ${{ steps.assemble.outputs.digest }}
      ref: ${{ steps.assemble.outputs.ref }}

    steps:
      - name: 登录到 GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: 组装多架构后端 manifest
        id: assemble
        env:
          IMAGE: ${{ env.GHCR_REGISTRY }}/${{ env.VULHUNTER_IMAGE_NAMESPACE }}/vulhunter-backend
          IMAGE_TAG: ${{ needs.prepare.outputs.tag }}
          FINAL_TAG: ${{ env.GHCR_REGISTRY }}/${{ env.VULHUNTER_IMAGE_NAMESPACE }}/vulhunter-backend:${{ needs.prepare.outputs.tag }}
          AMD64_TAG: ${{ needs.publish-backend-amd64.outputs.tag }}
          ARM64_TAG: ${{ needs.publish-backend-arm64.outputs.tag }}
          MULTI_ARCH: ${{ inputs.multi_arch }}
          EXPECTED_PLATFORMS: ${{ inputs.multi_arch && 'linux/amd64 linux/arm64' || 'linux/amd64' }}
        run: |
          set -euo pipefail

          if [[ "${MULTI_ARCH}" == "true" ]]; then
            docker buildx imagetools create -t "${FINAL_TAG}" "${AMD64_TAG}" "${ARM64_TAG}"
          else
            docker buildx imagetools create -t "${FINAL_TAG}" "${AMD64_TAG}"
          fi

          digest="$(docker buildx imagetools inspect "${FINAL_TAG}" --format '{{.Manifest.Digest}}')"
          echo "digest=${digest}" >> "$GITHUB_OUTPUT"
          echo "ref=${IMAGE}@${digest}" >> "$GITHUB_OUTPUT"

          raw_json="$(docker buildx imagetools inspect "${FINAL_TAG}" --raw)"
          RAW_JSON="${raw_json}" EXPECTED_PLATFORMS="${EXPECTED_PLATFORMS}" python3 - <<'PY'
          from __future__ import annotations

          import json
          import os

          raw = os.environ["RAW_JSON"]
          data = json.loads(raw)
          manifests = data.get("manifests", [])
          platforms = {
              f"{entry.get('platform', {}).get('os')}/{entry.get('platform', {}).get('architecture')}"
              for entry in manifests
          }
          expected = set(os.environ["EXPECTED_PLATFORMS"].split())
          missing = sorted(expected - platforms)
          if missing:
              raise SystemExit(f"missing manifest platforms: {', '.join(missing)}")
          print(f"validated platforms: {', '.join(sorted(platforms))}")
          PY

  publish-backend-hardened:
    name: Publish hardened backend image
    needs: prepare
    if: ${{ inputs.build_backend && inputs.publish_backend_hardened }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}
      ref: ${{ steps.capture.outputs.ref }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v6

      - name: 登录到 GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: 构建并推送 hardened 后端 Docker 镜像
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./docker/backend.Dockerfile
          target: runtime-cython
          push: true
          platforms: linux/amd64
          tags: ${{ env.GHCR_REGISTRY }}/${{ env.VULHUNTER_IMAGE_NAMESPACE }}/vulhunter-backend:${{ needs.prepare.outputs.tag }}-hardened
          build-args: |
            DOCKERHUB_LIBRARY_MIRROR=docker.m.daocloud.io/library
            VCS_REF=${{ inputs.revision != '' && inputs.revision || github.sha }}
          cache-from: |
            type=registry,ref=${{ env.GHCR_REGISTRY }}/${{ env.VULHUNTER_IMAGE_NAMESPACE }}/vulhunter-backend:buildcache-runtime-cython
            type=gha,scope=backend-runtime-cython
          cache-to: |
            type=registry,ref=${{ env.GHCR_REGISTRY }}/${{ env.VULHUNTER_IMAGE_NAMESPACE }}/vulhunter-backend:buildcache-runtime-cython,mode=max
            type=gha,mode=max,scope=backend-runtime-cython

      - name: 验证 hardened 后端镜像可解析
        run: |
          set -euo pipefail
          docker manifest inspect "${GHCR_REGISTRY}/${VULHUNTER_IMAGE_NAMESPACE}/vulhunter-backend:${IMAGE_TAG}" >/dev/null
        env:
          IMAGE_TAG: ${{ format('{0}-hardened', needs.prepare.outputs.tag) }}

      - name: 记录 hardened 后端镜像引用
        id: capture
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          IMAGE: ${{ env.GHCR_REGISTRY }}/${{ env.VULHUNTER_IMAGE_NAMESPACE }}/vulhunter-backend
        run: |
          set -euo pipefail
          echo "ref=${IMAGE}@${DIGEST}" >> "$GITHUB_OUTPUT"

  publish-yasa-runner-amd64:
    name: Publish YASA runner image (amd64)
    needs: prepare
    if: ${{ inputs.build_yasa_runner }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    outputs:
      tag: ${{ steps.capture.outputs.tag }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v6

      - name: 登录到 GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: 构建并推送 amd64 YASA runner Docker 镜像
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./docker/yasa-runner.Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ env.GHCR_REGISTRY }}/${{ env.VULHUNTER_IMAGE_NAMESPACE }}/vulhunter-yasa-runner:${{ needs.prepare.outputs.tag }}-${{ github.run_id }}-${{ github.run_attempt }}-amd64
          cache-from: type=gha,scope=yasa-runner-amd64
          cache-to: type=gha,mode=max,scope=yasa-runner-amd64

      - name: 记录 amd64 YASA runner 镜像标签
        id: capture
        env:
          IMAGE: ${{ env.GHCR_REGISTRY }}/${{ env.VULHUNTER_IMAGE_NAMESPACE }}/vulhunter-yasa-runner:${{ needs.prepare.outputs.tag }}-${{ github.run_id }}-${{ github.run_attempt }}-amd64
        run: |
          set -euo pipefail
          echo "tag=${IMAGE}" >> "$GITHUB_OUTPUT"

  publish-yasa-runner-arm64:
    name: Publish YASA runner image (arm64)
    needs: prepare
    if: ${{ inputs.build_yasa_runner && inputs.multi_arch }}
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    outputs:
      tag: ${{ steps.capture.outputs.tag }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v6

      - name: 登录到 GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: 构建并推送 arm64 YASA runner Docker 镜像
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./docker/yasa-runner.Dockerfile
          push: true
          platforms: linux/arm64
          tags: ${{ env.GHCR_REGISTRY }}/${{ env.VULHUNTER_IMAGE_NAMESPACE }}/vulhunter-yasa-runner:${{ needs.prepare.outputs.tag }}-${{ github.run_id }}-${{ github.run_attempt }}-arm64
          cache-from: type=gha,scope=yasa-runner-arm64
          cache-to: type=gha,mode=max,scope=yasa-runner-arm64

      - name: 记录 arm64 YASA runner 镜像标签
