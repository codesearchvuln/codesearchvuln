      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: 构建并推送 PMD runner Docker 镜像
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./docker/pmd-runner.Dockerfile
          push: true
          platforms: ${{ needs.prepare.outputs.platforms }}
          tags: ${{ env.GHCR_REGISTRY }}/${{ env.VULHUNTER_IMAGE_NAMESPACE }}/vulhunter-pmd-runner:${{ needs.prepare.outputs.tag }}
          cache-from: type=gha,scope=pmd-runner
          cache-to: type=gha,mode=max,scope=pmd-runner

      - name: 设置 PMD runner GHCR 包为公开可见性
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PACKAGE_NAME: vulhunter-pmd-runner
        run: |
          set -euo pipefail

          if gh api --method PATCH "/user/packages/container/${PACKAGE_NAME}" -f visibility=public --silent 2>/dev/null; then
            echo "${PACKAGE_NAME} set to public successfully"
          else
            echo "::warning::Could not set ${PACKAGE_NAME} to public via API."
          fi

      - name: 验证 PMD runner 镜像可解析
        run: |
          set -euo pipefail
          docker manifest inspect "${GHCR_REGISTRY}/${VULHUNTER_IMAGE_NAMESPACE}/vulhunter-pmd-runner:${IMAGE_TAG}" >/dev/null
        env:
          IMAGE_TAG: ${{ needs.prepare.outputs.tag }}

      - name: 记录 PMD runner 镜像引用
        id: capture
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          IMAGE: ${{ env.GHCR_REGISTRY }}/${{ env.VULHUNTER_IMAGE_NAMESPACE }}/vulhunter-pmd-runner
        run: |
          set -euo pipefail
          echo "ref=${IMAGE}@${DIGEST}" >> "$GITHUB_OUTPUT"

