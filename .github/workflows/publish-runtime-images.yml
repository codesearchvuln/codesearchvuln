  assemble-release-manifest:
    name: Assemble release manifest
    needs:
      - prepare
      - publish-frontend
      - publish-backend
      - publish-yasa-runner
      - publish-opengrep-runner
      - publish-bandit-runner
      - publish-gitleaks-runner
      - publish-phpstan-runner
      - publish-flow-parser-runner
      - publish-pmd-runner
      - publish-sandbox
      - publish-sandbox-runner
    if: ${{ always() && inputs.emit_release_manifest && !cancelled() }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    outputs:
      release_manifest: ${{ steps.release-manifest.outputs.json }}

    steps:
      - name: 检查依赖镜像 job 状态
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          python3 - <<'PY'
          from __future__ import annotations

          import json
          import os
          import sys

          needs = json.loads(os.environ["NEEDS_JSON"])
          failures = {
              name: data["result"]
              for name, data in needs.items()
              if name != "prepare" and data["result"] in {"failure", "cancelled"}
          }

          if failures:
              for name, result in failures.items():
                  print(f"::error::Dependency job {name} finished with {result}")
              sys.exit(1)
          PY

      - name: 登录到 GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: 生成 release-manifest.json
        id: release-manifest
        env:
          IMAGE_TAG: ${{ needs.prepare.outputs.tag }}
          REQUIRE_COMPLETE_MANIFEST: ${{ inputs.require_complete_manifest }}
          GITHUB_SHA: ${{ github.sha }}
          BACKEND_REF: ${{ needs.publish-backend.outputs.ref }}
          FRONTEND_REF: ${{ needs.publish-frontend.outputs.ref }}
          SANDBOX_REF: ${{ needs.publish-sandbox.outputs.ref }}
          SANDBOX_RUNNER_REF: ${{ needs.publish-sandbox-runner.outputs.ref }}
          SCANNER_YASA_REF: ${{ needs.publish-yasa-runner.outputs.ref }}
          SCANNER_OPENGREP_REF: ${{ needs.publish-opengrep-runner.outputs.ref }}
          SCANNER_BANDIT_REF: ${{ needs.publish-bandit-runner.outputs.ref }}
          SCANNER_GITLEAKS_REF: ${{ needs.publish-gitleaks-runner.outputs.ref }}
          SCANNER_PHPSTAN_REF: ${{ needs.publish-phpstan-runner.outputs.ref }}
          SCANNER_PMD_REF: ${{ needs.publish-pmd-runner.outputs.ref }}
          FLOW_PARSER_RUNNER_REF: ${{ needs.publish-flow-parser-runner.outputs.ref }}
        run: |
          set -euo pipefail

          resolve_ref() {
            local image="$1"
            local ref="$2"
            local resolved_digest

            if [[ -n "$ref" ]]; then
              printf '%s' "$ref"
              return 0
            fi

            resolved_digest="$(docker buildx imagetools inspect "${image}:${IMAGE_TAG}" --format '{{.Manifest.Digest}}' 2>/dev/null || true)"
            if [[ -z "$resolved_digest" ]]; then
              if [[ "${REQUIRE_COMPLETE_MANIFEST}" == "true" ]]; then
                echo "::error::Failed to resolve digest for ${image}:${IMAGE_TAG}" >&2
                return 1
              fi
              return 0
            fi

            printf '%s@%s' "$image" "$resolved_digest"
          }

          export BACKEND_FINAL_REF="$(resolve_ref "${GHCR_REGISTRY}/${VULHUNTER_IMAGE_NAMESPACE}/vulhunter-backend" "${BACKEND_REF}")"
          export FRONTEND_FINAL_REF="$(resolve_ref "${GHCR_REGISTRY}/${VULHUNTER_IMAGE_NAMESPACE}/vulhunter-frontend" "${FRONTEND_REF}")"
          export SANDBOX_FINAL_REF="$(resolve_ref "${GHCR_REGISTRY}/${VULHUNTER_IMAGE_NAMESPACE}/vulhunter-sandbox" "${SANDBOX_REF}")"
          export SANDBOX_RUNNER_FINAL_REF="$(resolve_ref "${GHCR_REGISTRY}/${VULHUNTER_IMAGE_NAMESPACE}/vulhunter-sandbox-runner" "${SANDBOX_RUNNER_REF}")"
          export SCANNER_YASA_FINAL_REF="$(resolve_ref "${GHCR_REGISTRY}/${VULHUNTER_IMAGE_NAMESPACE}/vulhunter-yasa-runner" "${SCANNER_YASA_REF}")"
          export SCANNER_OPENGREP_FINAL_REF="$(resolve_ref "${GHCR_REGISTRY}/${VULHUNTER_IMAGE_NAMESPACE}/vulhunter-opengrep-runner" "${SCANNER_OPENGREP_REF}")"
          export SCANNER_BANDIT_FINAL_REF="$(resolve_ref "${GHCR_REGISTRY}/${VULHUNTER_IMAGE_NAMESPACE}/vulhunter-bandit-runner" "${SCANNER_BANDIT_REF}")"
          export SCANNER_GITLEAKS_FINAL_REF="$(resolve_ref "${GHCR_REGISTRY}/${VULHUNTER_IMAGE_NAMESPACE}/vulhunter-gitleaks-runner" "${SCANNER_GITLEAKS_REF}")"
          export SCANNER_PHPSTAN_FINAL_REF="$(resolve_ref "${GHCR_REGISTRY}/${VULHUNTER_IMAGE_NAMESPACE}/vulhunter-phpstan-runner" "${SCANNER_PHPSTAN_REF}")"
          export SCANNER_PMD_FINAL_REF="$(resolve_ref "${GHCR_REGISTRY}/${VULHUNTER_IMAGE_NAMESPACE}/vulhunter-pmd-runner" "${SCANNER_PMD_REF}")"
          export FLOW_PARSER_RUNNER_FINAL_REF="$(resolve_ref "${GHCR_REGISTRY}/${VULHUNTER_IMAGE_NAMESPACE}/vulhunter-flow-parser-runner" "${FLOW_PARSER_RUNNER_REF}")"

          manifest_json="$(python3 - <<'PY'
          from __future__ import annotations

          import json
          import os
          from datetime import datetime, timezone


          def required(name: str) -> str:
              value = os.environ.get(name, "").strip()
              if not value and os.environ.get("REQUIRE_COMPLETE_MANIFEST", "false") == "true":
                  raise SystemExit(f"missing manifest ref: {name}")
              return value


          payload = {
              "revision": os.environ["GITHUB_SHA"],
              "generated_at": datetime.now(timezone.utc).replace(microsecond=0).isoformat().replace("+00:00", "Z"),
              "images": {
                  "backend": {"ref": required("BACKEND_FINAL_REF")},
                  "frontend": {"ref": required("FRONTEND_FINAL_REF")},
                  "sandbox": {"ref": required("SANDBOX_FINAL_REF")},
                  "sandbox_runner": {"ref": required("SANDBOX_RUNNER_FINAL_REF")},
                  "scanner_yasa": {"ref": required("SCANNER_YASA_FINAL_REF")},
                  "scanner_opengrep": {"ref": required("SCANNER_OPENGREP_FINAL_REF")},
                  "scanner_bandit": {"ref": required("SCANNER_BANDIT_FINAL_REF")},
                  "scanner_gitleaks": {"ref": required("SCANNER_GITLEAKS_FINAL_REF")},
                  "scanner_phpstan": {"ref": required("SCANNER_PHPSTAN_FINAL_REF")},
                  "scanner_pmd": {"ref": required("SCANNER_PMD_FINAL_REF")},
                  "flow_parser_runner": {"ref": required("FLOW_PARSER_RUNNER_FINAL_REF")},
              },
          }
          print(json.dumps(payload, separators=(",", ":")))
          PY
          )"

          printf '%s\n' "${manifest_json}" > release-manifest.json
          {
            echo "json=${manifest_json}"
          } >> "$GITHUB_OUTPUT"

      - name: 更新摘要
        run: |
          echo "- release-manifest.json generated" >> "$GITHUB_STEP_SUMMARY"
