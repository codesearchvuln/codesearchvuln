  publish-package-visibility:
    name: Update published GHCR package visibility
    needs:
      - publish-frontend
      - publish-backend
      - publish-backend-hardened
      - publish-yasa-runner
      - publish-opengrep-runner
      - publish-bandit-runner
      - publish-gitleaks-runner
      - publish-phpstan-runner
      - publish-flow-parser-runner
      - publish-pmd-runner
      - publish-sandbox-runner
    if: ${{ always() && !cancelled() }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      packages: write

    steps:
      - name: 汇总本次发布的 GHCR 包
        id: packages
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          set -euo pipefail

          python3 - <<'PY'
          from __future__ import annotations

          import json
          import os

          mapping = {
              "publish-frontend": "vulhunter-frontend",
              "publish-backend": "vulhunter-backend",
              "publish-backend-hardened": "vulhunter-backend",
              "publish-yasa-runner": "vulhunter-yasa-runner",
              "publish-opengrep-runner": "vulhunter-opengrep-runner",
              "publish-bandit-runner": "vulhunter-bandit-runner",
              "publish-gitleaks-runner": "vulhunter-gitleaks-runner",
              "publish-phpstan-runner": "vulhunter-phpstan-runner",
              "publish-flow-parser-runner": "vulhunter-flow-parser-runner",
              "publish-pmd-runner": "vulhunter-pmd-runner",
              "publish-sandbox-runner": "vulhunter-sandbox-runner",
          }
          needs = json.loads(os.environ["NEEDS_JSON"])
          packages = sorted(
              {
                  package
                  for job_name, package in mapping.items()
                  if needs.get(job_name, {}).get("result") == "success"
              }
          )

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              print("names<<EOF", file=output)
              for package in packages:
                  print(package, file=output)
              print("EOF", file=output)

          if packages:
              print(f"Will update visibility for: {', '.join(packages)}")
          else:
              print("No GHCR packages were published in this run.")
          PY

      - name: 更新 GHCR 包可见性
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PACKAGES: ${{ steps.packages.outputs.names }}
        run: |
          set -u

          if [[ -z "${PACKAGES:-}" ]]; then
            echo "No GHCR packages were published in this run."
            exit 0
          fi

          while IFS= read -r PACKAGE_NAME; do
            [[ -n "${PACKAGE_NAME}" ]] || continue

            if gh api --method PATCH "/user/packages/container/${PACKAGE_NAME}" -f visibility=public --silent 2>/dev/null; then
              echo "${PACKAGE_NAME} set to public successfully"
            else
              echo "::warning::Could not set ${PACKAGE_NAME} to public via API."
            fi
          done <<< "${PACKAGES}"

  assemble-release-manifest:
    name: Assemble release manifest
    needs:
      - prepare
      - publish-backend
      - publish-yasa-runner
      - publish-opengrep-runner
      - publish-bandit-runner
      - publish-gitleaks-runner
      - publish-phpstan-runner
      - publish-flow-parser-runner
      - publish-pmd-runner
      - publish-sandbox-runner
    if: ${{ always() && inputs.emit_release_manifest && !cancelled() }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: read
    outputs:
      release_manifest: ${{ steps.release-manifest.outputs.json }}

    steps:
      - name: 检查依赖镜像 job 状态
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          python3 - <<'PY'
          from __future__ import annotations

          import json
          import os
          import sys

          needs = json.loads(os.environ["NEEDS_JSON"])
          failures = {
              name: data["result"]
              for name, data in needs.items()
              if name != "prepare" and data["result"] in {"failure", "cancelled"}
          }

          if failures:
              for name, result in failures.items():
                  print(f"::error::Dependency job {name} finished with {result}")
              sys.exit(1)
          PY

      - name: 登录到 GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: 生成 release-manifest.json
        id: release-manifest
        env:
          IMAGE_TAG: ${{ needs.prepare.outputs.tag }}
          REQUIRE_COMPLETE_MANIFEST: ${{ inputs.require_complete_manifest }}
          REVISION: ${{ inputs.revision != '' && inputs.revision || github.sha }}
          POSTGRES_IMAGE: docker.io/library/postgres:15-alpine
          REDIS_IMAGE: docker.io/library/redis:7-alpine
          ADMINER_IMAGE: docker.io/library/adminer:latest
          SCAN_WORKSPACE_INIT_IMAGE: docker.io/library/alpine:3.20
          STATIC_FRONTEND_IMAGE: docker.io/library/nginx:1.27-alpine
          BACKEND_REF: ${{ needs.publish-backend.outputs.ref }}
          SANDBOX_RUNNER_REF: ${{ needs.publish-sandbox-runner.outputs.ref }}
          SCANNER_YASA_REF: ${{ needs.publish-yasa-runner.outputs.ref }}
          SCANNER_OPENGREP_REF: ${{ needs.publish-opengrep-runner.outputs.ref }}
          SCANNER_BANDIT_REF: ${{ needs.publish-bandit-runner.outputs.ref }}
          SCANNER_GITLEAKS_REF: ${{ needs.publish-gitleaks-runner.outputs.ref }}
          SCANNER_PHPSTAN_REF: ${{ needs.publish-phpstan-runner.outputs.ref }}
          SCANNER_PMD_REF: ${{ needs.publish-pmd-runner.outputs.ref }}
          FLOW_PARSER_RUNNER_REF: ${{ needs.publish-flow-parser-runner.outputs.ref }}
        run: |
          set -euo pipefail

          if [[ "${REQUIRE_COMPLETE_MANIFEST}" == "true" && -z "${BACKEND_REF}" ]]; then
            echo "::error::Release manifest requires a freshly built backend image ref; refusing to fall back to ${GHCR_REGISTRY}/${VULHUNTER_IMAGE_NAMESPACE}/vulhunter-backend:${IMAGE_TAG}" >&2
            exit 1
          fi

          resolve_ref() {
            local image="$1"
            local ref="$2"
            local resolved_digest

            if [[ -n "$ref" ]]; then
              printf '%s' "$ref"
              return 0
            fi

            resolved_digest="$(docker buildx imagetools inspect "${image}:${IMAGE_TAG}" --format '{{.Manifest.Digest}}' 2>/dev/null || true)"
            if [[ -z "$resolved_digest" ]]; then
              if [[ "${REQUIRE_COMPLETE_MANIFEST}" == "true" ]]; then
                echo "::error::Failed to resolve digest for ${image}:${IMAGE_TAG}" >&2
                return 1
              fi
              return 0
            fi

            printf '%s@%s' "$image" "$resolved_digest"
          }

          resolve_external_ref() {
            local ref="$1"
            local image="${ref%%@*}"
            local resolved_digest

            resolved_digest="$(docker buildx imagetools inspect "${ref}" --format '{{.Manifest.Digest}}' 2>/dev/null || true)"
            if [[ -z "$resolved_digest" ]]; then
              if [[ "${REQUIRE_COMPLETE_MANIFEST}" == "true" ]]; then
                echo "::error::Failed to resolve digest for ${ref}" >&2
                return 1
              fi
              return 0
            fi

            printf '%s@%s' "$image" "$resolved_digest"
          }

          export BACKEND_FINAL_REF="$(resolve_ref "${GHCR_REGISTRY}/${VULHUNTER_IMAGE_NAMESPACE}/vulhunter-backend" "${BACKEND_REF}")"
          export POSTGRES_FINAL_REF="$(resolve_external_ref "${POSTGRES_IMAGE}")"
          export REDIS_FINAL_REF="$(resolve_external_ref "${REDIS_IMAGE}")"
          export ADMINER_FINAL_REF="$(resolve_external_ref "${ADMINER_IMAGE}")"
          export SCAN_WORKSPACE_INIT_FINAL_REF="$(resolve_external_ref "${SCAN_WORKSPACE_INIT_IMAGE}")"
          export STATIC_FRONTEND_FINAL_REF="$(resolve_external_ref "${STATIC_FRONTEND_IMAGE}")"
          export SANDBOX_RUNNER_FINAL_REF="$(resolve_ref "${GHCR_REGISTRY}/${VULHUNTER_IMAGE_NAMESPACE}/vulhunter-sandbox-runner" "${SANDBOX_RUNNER_REF}")"
          export SCANNER_YASA_FINAL_REF="$(resolve_ref "${GHCR_REGISTRY}/${VULHUNTER_IMAGE_NAMESPACE}/vulhunter-yasa-runner" "${SCANNER_YASA_REF}")"
          export SCANNER_OPENGREP_FINAL_REF="$(resolve_ref "${GHCR_REGISTRY}/${VULHUNTER_IMAGE_NAMESPACE}/vulhunter-opengrep-runner" "${SCANNER_OPENGREP_REF}")"
          export SCANNER_BANDIT_FINAL_REF="$(resolve_ref "${GHCR_REGISTRY}/${VULHUNTER_IMAGE_NAMESPACE}/vulhunter-bandit-runner" "${SCANNER_BANDIT_REF}")"
          export SCANNER_GITLEAKS_FINAL_REF="$(resolve_ref "${GHCR_REGISTRY}/${VULHUNTER_IMAGE_NAMESPACE}/vulhunter-gitleaks-runner" "${SCANNER_GITLEAKS_REF}")"
          export SCANNER_PHPSTAN_FINAL_REF="$(resolve_ref "${GHCR_REGISTRY}/${VULHUNTER_IMAGE_NAMESPACE}/vulhunter-phpstan-runner" "${SCANNER_PHPSTAN_REF}")"
          export SCANNER_PMD_FINAL_REF="$(resolve_ref "${GHCR_REGISTRY}/${VULHUNTER_IMAGE_NAMESPACE}/vulhunter-pmd-runner" "${SCANNER_PMD_REF}")"
          export FLOW_PARSER_RUNNER_FINAL_REF="$(resolve_ref "${GHCR_REGISTRY}/${VULHUNTER_IMAGE_NAMESPACE}/vulhunter-flow-parser-runner" "${FLOW_PARSER_RUNNER_REF}")"

          manifest_json="$(python3 - <<'PY'
          from __future__ import annotations

          import json
          import os
          from datetime import datetime, timezone


          def required(name: str) -> str:
              value = os.environ.get(name, "").strip()
              if not value and os.environ.get("REQUIRE_COMPLETE_MANIFEST", "false") == "true":
                  raise SystemExit(f"missing manifest ref: {name}")
              return value


          payload = {
              "revision": os.environ["REVISION"],
              "generated_at": datetime.now(timezone.utc).replace(microsecond=0).isoformat().replace("+00:00", "Z"),
              "images": {
                  "backend": {"ref": required("BACKEND_FINAL_REF")},
                  "postgres": {"ref": required("POSTGRES_FINAL_REF")},
                  "redis": {"ref": required("REDIS_FINAL_REF")},
                  "adminer": {"ref": required("ADMINER_FINAL_REF")},
                  "scan_workspace_init": {"ref": required("SCAN_WORKSPACE_INIT_FINAL_REF")},
                  "static_frontend": {"ref": required("STATIC_FRONTEND_FINAL_REF")},
                  "sandbox_runner": {"ref": required("SANDBOX_RUNNER_FINAL_REF")},
                  "scanner_yasa": {"ref": required("SCANNER_YASA_FINAL_REF")},
                  "scanner_opengrep": {"ref": required("SCANNER_OPENGREP_FINAL_REF")},
                  "scanner_bandit": {"ref": required("SCANNER_BANDIT_FINAL_REF")},
                  "scanner_gitleaks": {"ref": required("SCANNER_GITLEAKS_FINAL_REF")},
                  "scanner_phpstan": {"ref": required("SCANNER_PHPSTAN_FINAL_REF")},
                  "scanner_pmd": {"ref": required("SCANNER_PMD_FINAL_REF")},
                  "flow_parser_runner": {"ref": required("FLOW_PARSER_RUNNER_FINAL_REF")},
              },
          }
          print(json.dumps(payload, separators=(",", ":")))
          PY
          )"

          printf '%s\n' "${manifest_json}" > release-manifest.json
          {
            echo "json=${manifest_json}"
          } >> "$GITHUB_OUTPUT"

      - name: 更新摘要
        run: |
          echo "- release-manifest.json generated" >> "$GITHUB_STEP_SUMMARY"
