name: Publish Runtime Images

on:
  workflow_call:
    inputs:
      tag:
        description: Runtime image tag to publish or resolve.
        required: false
        type: string
        default: latest
      build_frontend:
        required: false
        type: boolean
        default: false
      build_backend:
        required: false
        type: boolean
        default: false
      build_yasa_runner:
        required: false
        type: boolean
        default: false
      build_opengrep_runner:
        required: false
        type: boolean
        default: false
      build_bandit_runner:
        required: false
        type: boolean
        default: false
      build_gitleaks_runner:
        required: false
        type: boolean
        default: false
      build_phpstan_runner:
        required: false
        type: boolean
        default: false
      build_flow_parser_runner:
        required: false
        type: boolean
        default: false
      build_pmd_runner:
        required: false
        type: boolean
        default: false
      build_sandbox:
        required: false
        type: boolean
        default: false
      build_sandbox_runner:
        required: false
        type: boolean
        default: false
      multi_arch:
        required: false
        type: boolean
        default: false
      emit_release_manifest:
        required: false
        type: boolean
        default: false
      require_complete_manifest:
        required: false
        type: boolean
        default: false
    outputs:
      release_manifest:
        description: Machine-readable manifest with digest-pinned runtime refs.
        value: ${{ jobs.assemble-release-manifest.outputs.release_manifest }}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  GHCR_REGISTRY: ghcr.io
  VULHUNTER_IMAGE_NAMESPACE: unbengable12

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.shared.outputs.tag }}
      platforms: ${{ steps.shared.outputs.platforms }}

    steps:
      - name: 计算共享构建参数
        id: shared
        env:
          INPUT_TAG: ${{ inputs.tag }}
          MULTI_ARCH: ${{ inputs.multi_arch }}
        run: |
          set -euo pipefail

          echo "tag=${INPUT_TAG:-latest}" >> "$GITHUB_OUTPUT"
          if [[ "${MULTI_ARCH}" == "true" ]]; then
            echo "platforms=linux/amd64,linux/arm64" >> "$GITHUB_OUTPUT"
          else
            echo "platforms=linux/amd64" >> "$GITHUB_OUTPUT"
          fi

      - name: 输出发布摘要
        run: |
          echo "## Runtime image publish" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- tag: \`${{ steps.shared.outputs.tag }}\`" >> "$GITHUB_STEP_SUMMARY"

  publish-frontend:
    name: Publish frontend image
    needs: prepare
    if: ${{ inputs.build_frontend }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}
      ref: ${{ steps.capture.outputs.ref }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v6

      - name: 登录到 GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 设置 QEMU
        if: ${{ inputs.multi_arch }}
        uses: docker/setup-qemu-action@v4

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: 构建并推送前端 Docker 镜像
        id: build
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          file: ./docker/frontend.Dockerfile
          push: true
          platforms: ${{ needs.prepare.outputs.platforms }}
          tags: ${{ env.GHCR_REGISTRY }}/${{ env.VULHUNTER_IMAGE_NAMESPACE }}/vulhunter-frontend:${{ needs.prepare.outputs.tag }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      - name: 设置前端 GHCR 包为公开可见性
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PACKAGE_NAME: vulhunter-frontend
        run: |
          set -euo pipefail

          if gh api --method PATCH "/user/packages/container/${PACKAGE_NAME}" -f visibility=public --silent 2>/dev/null; then
            echo "${PACKAGE_NAME} set to public successfully"
          else
            echo "::warning::Could not set ${PACKAGE_NAME} to public via API."
          fi

      - name: 验证前端镜像可解析
        run: |
          set -euo pipefail
          docker manifest inspect "${GHCR_REGISTRY}/${VULHUNTER_IMAGE_NAMESPACE}/vulhunter-frontend:${IMAGE_TAG}" >/dev/null
        env:
          IMAGE_TAG: ${{ needs.prepare.outputs.tag }}

      - name: 记录前端镜像引用
        id: capture
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          IMAGE: ${{ env.GHCR_REGISTRY }}/${{ env.VULHUNTER_IMAGE_NAMESPACE }}/vulhunter-frontend
        run: |
          set -euo pipefail
          echo "ref=${IMAGE}@${DIGEST}" >> "$GITHUB_OUTPUT"

