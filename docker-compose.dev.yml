# =============================================
# VulHunter 全栈开发态覆盖配置
# =============================================
# 用法:
# docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d --build

services:
  backend:
    image: vulhunter/backend-dev:latest
    build:
      target: dev-runtime
    working_dir: /app
    volumes: !override
      - ./backend:/app
      - backend_venv:/app/.venv
      - backend_uv_cache:/root/.cache/uv
      - backend_uploads:/app/uploads
      - mcp_data:/app/data/mcp
      - qmd_data:/app/data/qmd
      - /tmp/vulhunter:/tmp/vulhunter
      - /tmp/vulhunter:/tmp/deepaudit
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      MCP_REQUIRE_ALL_READY_ON_STARTUP: "false"
      SKILL_REGISTRY_AUTO_SYNC_ON_STARTUP: "false"

  frontend:
    image: vulhunter/frontend-dev:latest
    build:
      target: dev
    working_dir: /app
    command: /app/scripts/dev-entrypoint.sh
    volumes: !override
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_pnpm_store:/pnpm/store
    ports: !override
      - "${VULHUNTER_FRONTEND_PORT:-3000}:5173"
    environment:
      VITE_API_TARGET: http://backend:8000
      FRONTEND_DEV_PORT: "5173"
      FRONTEND_NPM_REGISTRY: ${FRONTEND_NPM_REGISTRY:-https://registry.npmmirror.com}
      FRONTEND_DEV_INSTALL_MODE: ${FRONTEND_DEV_INSTALL_MODE:-auto}
      CHOKIDAR_USEPOLLING: ${CHOKIDAR_USEPOLLING:-}

volumes:
  backend_venv:
  backend_uv_cache:
  frontend_node_modules:
  frontend_pnpm_store:
